bcr_test_module:
  module_path: "e2e"
  matrix:
    bazel: ["8.x", "9.*"]
    # TODO(#9): add windows to this list
    platform: ["debian11", "ubuntu2204"]
  tasks:
    run_tests:
      name: "Run test module"
      bazel: ${{ bazel }}
      platform: ${{ platform }}
      test_flags:
        - "--test_tag_filters=-requires-docker"
      test_targets:
        - "//cases/..."
        - "-//cases/oci/py_image_layer:my_app_layers_fp_test_test"
        - "-//cases/uv-deps-650/crossbuild:app_arm64_layers_test"
        - "-//cases/uv-deps-650/crossbuild:app_amd64_layers_test"
        - "-//cases/oci/py_image_layer:my_app_layers_test_test"
