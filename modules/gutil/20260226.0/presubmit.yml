matrix:
  platform:
  - ubuntu2204
  - ubuntu2404
  bazel:
  - 7.x
  - 8.x
tasks:
  verify_targets:
    name: Verify build targets
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_flags:
      - '--cxxopt=-std=c++20'
      - '--host_cxxopt=-std=c++20'
    build_targets:
      - '@gutil//...'
      # Excluded because it depends on @google_benchmark, a dev_dependency not
      # available in the BCR presubmit. The benchmark/test mix in this target
      # should ideally be split upstream.
      - '-@gutil//gutil:test_artifact_writer_test'
