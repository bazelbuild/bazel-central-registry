matrix:
  platform:
    - debian10
    - ubuntu2004
    - macos
  bazel:
    - 7.x
    - 8.x
tasks:
  verify_targets:
    name: Verify build targets
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets:
      - '@ccronexpr//:ccronexpr'
      - '@ccronexpr//:supertinycron'
    test_targets:
      - '@ccronexpr//:ccronexpr_test'
  # supertinycron relies on POSIX APIs and is not built on Windows; only the
  # library and its test are verified there.
  verify_targets_on_windows:
    name: Verify build targets
    platform: windows
    bazel: ${{ bazel }}
    build_targets:
      - '@ccronexpr//:ccronexpr'
    test_targets:
      - '@ccronexpr//:ccronexpr_test'
