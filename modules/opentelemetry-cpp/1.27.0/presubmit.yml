matrix:
  unix_platform:
    - debian10
    - macos
    - ubuntu2004
  windows_platform:
    - windows
  bazel: ["7.x", "8.x", "9.x"]
tasks:
  unix_verify_targets:
    name: Verify unix build targets
    platform: ${{ unix_platform }}
    bazel: ${{ bazel }}
    build_flags:
    - '--cxxopt=-std=c++17'
    - '--host_cxxopt=-std=c++17'
    build_targets:
    - '@opentelemetry-cpp//api'
  windows_verify_targets:
    name: Verify windows build targets
    platform: ${{ windows_platform }}
    bazel: ${{ bazel }}
    build_flags:
    - '--cxxopt=/std:c++17'
    - '--host_cxxopt=/std:c++17'
    build_targets:
    - '@opentelemetry-cpp//api'
