matrix:
  linux_platform: ["rockylinux8", "ubuntu2204", "ubuntu2204_arm64", "ubuntu2404"]
  osx_platform: ["macos", "macos_arm64"]
  bazel: [7.x, 8.x, 9.x, rolling]

tasks:
  verify_linux_targets:
    name: Verify linux build and test targets
    platform: ${{ linux_platform }}
    bazel: ${{ bazel }}
    build_targets:
    - '@glfw//:glfw'
  verify_osx_targets:
    name: Verify osx build and test targets
    platform: ${{ osx_platform }}
    bazel: ${{ bazel }}
    build_targets:
    - '@glfw//:glfw'
    build_flags:
    - "--repo_env=BAZEL_DO_NOT_DETECT_CPP_TOOLCHAIN=1"
  verify_windows_targets:
    name: Verify windows build and test targets
    platform: windows
    bazel: ${{ bazel }}
    build_targets:
    - '@glfw//:glfw'
