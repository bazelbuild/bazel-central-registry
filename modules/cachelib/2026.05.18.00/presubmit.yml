matrix:
  bazel: [7.x, 8.x, 9.x]
  platform:
    - debian13
    - ubuntu2404
tasks:
  verify_targets:
    name: Verify CacheLib targets
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_flags:
      - "--incompatible_autoload_externally=+@rules_cc"
      - "--cxxopt=-std=c++20"
      - "--host_cxxopt=-std=c++20"
    build_targets:
      - "@cachelib//:allocator"
      - "@cachelib//:navy"

bcr_test_module:
  module_path: test
  matrix:
    bazel: [7.x, 8.x, 9.x]
    platform:
      - debian13
      - ubuntu2404
  tasks:
    run_allocator_smoke_test:
      name: Run CacheLib allocator consumer smoke test
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      test_flags:
        - "--incompatible_autoload_externally=+@rules_cc"
        - "--cxxopt=-std=c++20"
        - "--host_cxxopt=-std=c++20"
      test_targets:
        - "//:allocator_smoke_test"
