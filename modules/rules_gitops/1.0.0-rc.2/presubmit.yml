bcr_test_module:
    module_path: '.'
    matrix:
        bazel: ['7.x', '8.x', '9.x']
        platform: ['debian10', 'macos', 'ubuntu2004']
    tasks:
        run_tests:
            name: 'Run test module'
            bazel: ${{ bazel }}
            platform: ${{ platform }}
            test_flags:
                - "--test_tag_filters=-skip-bazel-ci"
            test_targets:
                - '//...'