bcr_test_module:
  module_path: "."
  matrix:
    platform: ["debian11", "macos", "windows"]
    bazel: ["8.x", "9.x"]
  tasks:
    run_tests:
      name: "Build module"
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      build_flags:
        - "--experimental_remote_downloader="
        - "--bes_backend=="
      build_targets:
        - "//..."

