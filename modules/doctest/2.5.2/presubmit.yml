matrix:
  platform:
  - debian10
  - ubuntu2204
  - macos
  - windows
  bazel: [8.x, 9.*]
tasks:
  verify_targets:
    name: Verify build targets
    bazel: ${{ bazel }}
    platform: ${{ platform }}
    build_targets:
    - '@doctest//:main'
bcr_test_module:
  module_path: examples
  matrix:
    platform:
    - debian10
    - ubuntu2204
    - macos
    - windows
    bazel: [8.x, 9.*]
  tasks:
    run_tests:
      name: Run consumer tests
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      test_targets:
      - '//exe_with_static_libs'
