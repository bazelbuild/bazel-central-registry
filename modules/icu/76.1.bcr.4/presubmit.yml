matrix:
  unix_platform:
    - ubuntu2204
    - ubuntu2404
    - macos
    - macos_arm64
  bazel: [7.x, 8.x, 9.x, rolling]
  data-mode: [prebuilt, source]
tasks:
  verify_targets_unix:
    platform: ${{ unix_platform }}
    bazel: ${{ bazel }}
    build_flags:
      - "--cxxopt=-std=c++17"
      - "--@icu//:data-mode=${{ data-mode }}"
    build_targets:
      - "@icu//:all"
      - "@icu//icu4c/..."
      - "@icu//testdata/..."
    test_flags:
      - "--cxxopt=-std=c++17"
      - "--@icu//:data-mode=${{ data-mode }}"
    test_targets:
      - "@icu//:all"
      - "@icu//icu4c/..."
      - "@icu//testdata/..."
  verify_targets_windows:
    platform: windows
    bazel: ${{ bazel }}
    build_flags:
      - "--cxxopt=/std:c++17"
      - "--@icu//:data-mode=${{ data-mode }}"
    build_targets:
      - "@icu//:all"
      - "@icu//icu4c/..."
      - "@icu//testdata/..."
    test_flags:
      - "--cxxopt=/std:c++17"
      - "--@icu//:data-mode=${{ data-mode }}"
    test_targets:
      - "@icu//:all"
      - "@icu//icu4c/..."
      - "@icu//testdata/..."
