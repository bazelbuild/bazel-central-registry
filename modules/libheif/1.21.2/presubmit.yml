matrix:
  platform:
    - debian11
    - macos_arm64
    - ubuntu2404
    - ubuntu2404_arm64
    - windows
  bazel: ["7.x", "8.x", "9.x"]
tasks:
  verify_targets:
    name: "Run test module"
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets:
    - "@libheif//..."
    test_targets:
    - "@libheif//..."
  verify_all_deps:
    name: "All optional dependencies enabled"
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_flags: &all_deps_flags
    - "--@libheif//:with_libde265=True"
    - "--@libheif//:with_zlib=True"
    - "--@libheif//:with_brotli=True"
    - "--@libheif//:multithreading=True"
    build_targets:
    - "@libheif//..."
    test_flags: *all_deps_flags
    test_targets:
    - "@libheif//..."
