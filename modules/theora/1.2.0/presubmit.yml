matrix:
  platform:
  - debian13
  - ubuntu2404
  - ubuntu2404_arm64
  bazel: ["8.x", "9.x", "rolling"]
tasks:
  verify_targets:
    name: Verify build targets
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets:
    - '@theora//...'
  verify_targets_asm:
    name: Verify build targets with ASM optimization
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_flags:
    - '--//theora:with_asm_optimization=true'
    build_targets:
    - '@theora//...'
  run_tests:
    name: Run tests
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    test_targets:
    - '@theora//...'
  run_tests_asm:
    name: Run tests with ASM optimization
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_flags:
    - '--//theora:with_asm_optimization=true'
    test_targets:
    - '@theora//...'
