matrix:
  platform:
    - ubuntu2404
    - ubuntu2404_arm64
    - macos
    - macos_arm64
    - windows
    - windows_arm64
  bazel:
    - 7.x
    - 8.x
    - 9.x
    - rolling
tasks:
  verify_targets:
    name: Verify build targets
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets:
      - '//...'
bcr_test_module:
  module_path: tests
  matrix:
    platform:
      - ubuntu2404
      - ubuntu2404_arm64
      - macos
      - macos_arm64
      - windows
      - windows_arm64
    bazel:
      - 7.x
      - 8.x
      - 9.x
      - rolling
  tasks:
    run_tests:
      name: Run test module
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      build_targets:
        - //...
      test_targets:
        - //...
