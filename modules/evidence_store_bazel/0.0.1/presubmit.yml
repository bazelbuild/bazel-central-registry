matrix:
  platform:
    - debian11
    - ubuntu2004
    - macos
  bazel: [7.*, 8.*, 9.*]

tasks:
  verify_build:
    name: Verify build targets
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets:
      - "//cmd/evidence-bazel"
  verify_tests:
    name: Run adapter tests
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    test_targets:
      - "//..."
