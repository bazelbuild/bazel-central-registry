bcr_test_module:
  module_path: "e2e/simple_proto"
  matrix:
    platform: ["debian11", "macos", "ubuntu2204"]
    bazel: ["9.x"]
  tasks:
    run_tests:
      name: "Run test module"
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      test_targets:
        - "//..."
