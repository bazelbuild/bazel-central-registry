matrix:
  platform:
    - ubuntu2404
    - ubuntu2404_arm64
    - macos
    - macos_arm64
    - windows
  bazel:
    - 8.x
    - 9.x
    - rolling
bcr_test_module:
  module_path: test
  matrix:
    platform:
      - ubuntu2404
      - ubuntu2404_arm64
      - macos
      - macos_arm64
      - windows
    bazel:
      - 8.x
      - 9.x
      - rolling
  tasks:
    verify_targets:
      name: Verify build targets
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      build_targets:
        - '@crispy-doom//src:crispy-doom'
        - '@crispy-doom//src:crispy-heretic'
        - '@crispy-doom//src:crispy-hexen'
        - '@crispy-doom//src:crispy-strife'
        - '@crispy-doom//src:crispy-server'
        - '@crispy-doom//src/setup:crispy-setup'
