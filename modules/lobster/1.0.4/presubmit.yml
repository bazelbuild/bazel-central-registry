incompatible_flags:
  "--incompatible_config_setting_private_default_visibility":
    - 8.x
  "--incompatible_disable_starlark_host_transitions":
    - 8.x
  "--incompatible_disable_native_repo_rules":
    - 8.x
  "--incompatible_strict_action_env":
    - 8.x

matrix:
  platform:
    - ubuntu2204
    - windows
  bazel:
    - 8.x

tasks:
  verify_module:
    name: "Build lobster module entry points"
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets:
      - "@lobster//:lobster"
      - "@lobster//:lobster-report"