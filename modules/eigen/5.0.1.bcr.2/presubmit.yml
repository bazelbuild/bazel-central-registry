matrix:
  platform:
  - debian12
  - debian13
  - ubuntu2204
  - ubuntu2404
  - macos_arm64
  - windows
  bazel: ["7.x", "8.x", "9.x"]
tasks:
  verify_targets:
    name: Verify build targets
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets:
    - '@eigen//:eigen'
  verify_targets_align:
    name: Verify build targets with alignment configs
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_flags:
    - '--@eigen//:EIGEN_MALLOC_ALREADY_ALIGNED=0'
    - '--@eigen//:EIGEN_MAX_ALIGN_BYTES=16'
    build_targets:
    - '@eigen//:eigen'
