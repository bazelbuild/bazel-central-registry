matrix:
  platform:
    - macos_arm64
    - ubuntu2404
    - windows
  bazel: [7.x, 8.x, 9.x, rolling]
tasks:
  verify_targets:
    name: Verify build targets
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    shell_commands:
      - sudo apt-get update
      - sudo apt-get install -y libgl-dev
    build_targets:
      - "@glew//..."
