matrix:
  platform:
    - debian13
    - ubuntu2404
    - macos
    - macos_arm64
    - windows
  bazel: [7.x, 8.x, 9.x, rolling]
tasks:
  verify_targets:
    name: Verify build targets
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets: ["@libunibreak//:libunibreak"]
bcr_test_module:
  module_path: tests
  matrix:
    platform:
      - debian13
      - ubuntu2404
      - macos
      - macos_arm64
      - windows
    bazel: [7.x, 8.x, 9.x, rolling]
  tasks:
    run_test_module:
      name: Run smoke test
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      test_targets: ["//:smoke"]
