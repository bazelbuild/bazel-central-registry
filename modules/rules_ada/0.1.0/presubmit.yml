bcr_test_module:
  module_path: "examples/simple"
  matrix:
    platform:
      # GNAT 15.1.0-2 bundles a linker built against macOS 14 (darwin23.6.0).
      # BCR Buildkite runners may only have newer SDKs (e.g., macOS 26) whose
      # library layout is incompatible with the bundled linker, causing
      # `ld: library not found for -lSystem`. macOS testing is disabled until
      # a GNAT build targeting a newer SDK is available.
      # - "macos_arm64"
      - "ubuntu2204"
      - "ubuntu2204_arm64"
      - "windows"
    bazel: [7.x, 8.x, 9.x]
  tasks:
    run_tests:
      name: "Run test module"
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      test_targets:
        - "//..."
