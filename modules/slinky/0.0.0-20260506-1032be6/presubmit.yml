matrix:
  platform: ["ubuntu2404", "macos", "macos_arm64"]
  bazel:
    - 7.x
    - 8.x
    - 9.x
    - rolling

tasks:
  verify_targets:
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_flags:
      - "--cxxopt=-std=c++17"
      - "--host_cxxopt=-std=c++17"
    build_targets:
      - "@slinky//..."

bcr_test_module:
  module_path: tests
  matrix:
    platform: ["ubuntu2404", "macos", "macos_arm64"]
    bazel:
      - 7.x
      - 8.x
      - 9.x
      - rolling
  tasks:
    run_test_module:
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      build_flags:
        - "--cxxopt=-std=c++17"
        - "--host_cxxopt=-std=c++17"
      build_targets:
        - //...
      test_targets:
        - //...
