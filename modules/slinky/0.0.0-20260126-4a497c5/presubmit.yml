matrix:
  platform:
    - ubuntu2404
    - macos_arm64
    - windows
  bazel:
    - 8.x
    - 9.x
tasks:
  verify_targets:
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_flags:
      - "--cxxopt=-std=c++17"
    test_flags:
      - "--cxxopt=-std=c++17"
    build_targets:
      - "//..."
    test_targets:
      - "//..."
