matrix:
  unix_platform:
  - debian11
  - ubuntu2404
  - ubuntu2404_arm64
  - macos
  - macos_arm64
  windows_platform:
  - windows
  bazel:
  - 8.x
  - 9.x
tasks:
  verify_targets_unix:
    name: Verify build targets (Unix)
    platform: ${{ unix_platform }}
    bazel: ${{ bazel }}
    environment:
      ANDROID_HOME: ""
      ANDROID_NDK_HOME: ""
    build_flags:
    - '--cxxopt=-std=c++17'
    - '--host_cxxopt=-std=c++17'
    build_targets:
    - '@sentencepiece//:sentencepiece'
    - '@sentencepiece//:sentencepiece_train'
    - '@sentencepiece//src:spm_decode'
    - '@sentencepiece//src:spm_encode'
    - '@sentencepiece//src:spm_export_vocab'
    - '@sentencepiece//src:spm_normalize'
    - '@sentencepiece//src:spm_train'
  verify_targets_windows:
    name: Verify build targets (Windows)
    platform: ${{ windows_platform }}
    bazel: ${{ bazel }}
    environment:
      ANDROID_HOME: ""
      ANDROID_NDK_HOME: ""
    build_flags:
    - '--cxxopt=/std:c++17'
    - '--host_cxxopt=/std:c++17'
    - '--cxxopt=/utf-8'
    - '--host_cxxopt=/utf-8'
    build_targets:
    - '@sentencepiece//:sentencepiece'
    - '@sentencepiece//:sentencepiece_train'
    - '@sentencepiece//src:spm_decode'
    - '@sentencepiece//src:spm_encode'
    - '@sentencepiece//src:spm_export_vocab'
    - '@sentencepiece//src:spm_normalize'
    - '@sentencepiece//src:spm_train'
bcr_test_module:
  module_path: bcr_tests
  matrix:
    unix_platform:
    - debian11
    - ubuntu2404
    - ubuntu2404_arm64
    - macos
    - macos_arm64
    windows_platform:
    - windows
    bazel:
    - 8.x
    - 9.x
  tasks:
    run_test_module_unix:
      name: Run test module (Unix)
      platform: ${{ unix_platform }}
      bazel: ${{ bazel }}
      environment:
        ANDROID_HOME: ""
        ANDROID_NDK_HOME: ""
      build_flags:
      - '--cxxopt=-std=c++17'
      - '--host_cxxopt=-std=c++17'
      test_targets:
      - '//...'
    run_test_module_windows:
      name: Run test module (Windows)
      platform: ${{ windows_platform }}
      bazel: ${{ bazel }}
      environment:
        ANDROID_HOME: ""
        ANDROID_NDK_HOME: ""
      build_flags:
      - '--cxxopt=/std:c++17'
      - '--host_cxxopt=/std:c++17'
      - '--cxxopt=/utf-8'
      - '--host_cxxopt=/utf-8'
      test_targets:
      - '//...'
