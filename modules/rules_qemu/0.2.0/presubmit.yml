bcr_test_module:
  module_path: "e2e/smoke"
  matrix:
    bazel: ["9.x", "8.x"]
  tasks:
    x86_64_non_musl:
      name: "Run x86_64 non-musl smoke test"
      platform: "ubuntu2204"
      bazel: ${{ bazel }}
      test_flags:
        - "--config=bcr"
      test_targets:
        - "//:hello_x86_64_qemu_test"
    aarch64_non_musl:
      name: "Run aarch64 non-musl smoke test"
      platform: "ubuntu2204_arm64"
      bazel: ${{ bazel }}
      test_flags:
        - "--config=bcr"
      test_targets:
        - "//:hello_aarch64_qemu_test"
