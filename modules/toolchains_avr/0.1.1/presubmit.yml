matrix:
  platform:
  - debian11
  - ubuntu2204
  - macos
  - macos_arm64
  bazel:
  - 9.x
tasks:
  verify_targets:
    name: Verify build targets
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets:
    - '@toolchains_avr//cc/toolchain:all'
bcr_test_module:
  module_path: examples/blinkie
  matrix:
    platform:
    - debian11
    - ubuntu2204
    - macos
    - macos_arm64
    bazel:
    - 9.x
  tasks:
    run_test_module:
      name: Run test module
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      build_targets:
      - //src/hello:hello
      build_flags:
      - "--config=avr"
