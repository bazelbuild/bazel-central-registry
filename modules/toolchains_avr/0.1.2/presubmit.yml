bcr_test_module:
  module_path: examples/blinkie
  matrix:
    platform:
    - debian13
    - debian13_arm64
    - ubuntu2404
    - ubuntu2404_arm64
    - macos_arm64
    bazel:
    - 9.x
  tasks:
    run_test_module:
      name: Run test module
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      build_targets:
      - //src/hello:hello
      build_flags:
      - "--config=avr"
