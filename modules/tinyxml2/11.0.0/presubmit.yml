matrix:
  platform:
  - debian12
  - debian13
  - ubuntu2204
  - ubuntu2404
  - ubuntu2404_arm64
  - macos_arm64
  - windows
  test_platform:
  - ubuntu2404
  - ubuntu2404_arm64
  - macos_arm64
  bazel: ["7.x", "8.x", "9.x"]
tasks:
  build:
    name: Build
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets:
    - "@tinyxml2"
  test:
    name: Test
    platform: ${{ test_platform }}
    bazel: ${{ bazel }}
    test_targets:
    - "@tinyxml2//:xmltest"
    test_flags:
    - "--test_output=errors"
    - "--cxxopt=-std=c++17"
