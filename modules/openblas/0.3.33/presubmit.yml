matrix:
  platform:
  - debian13
  - macos_arm64
  - ubuntu2404
  - ubuntu2404_arm64
  bazel:
  - 7.x
  - 8.x
  - 9.x
tasks:
  verify_targets:
    name: Verify build targets
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets:
    - '@openblas//...'

bcr_test_module:
  module_path: utest
  matrix:
    platform:
    - debian13
    - macos_arm64
    - ubuntu2404
    - ubuntu2404_arm64
    bazel:
    - 7.x
    - 8.x
    - 9.x
  tasks:
    run_tests:
      name: Run OpenBLAS tests
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      test_targets:
      - //...
