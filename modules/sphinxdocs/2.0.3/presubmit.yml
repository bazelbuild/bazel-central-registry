bcr_test_module:
  module_path: "integration_tests/bcr"
  matrix:
    platform: ["debian11", "macos", "ubuntu2204"]
    bazel: [8.*, 9.*]
  tasks:
    run_tests:
      name: "Run test module"
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      shell_commands:
        - "echo 'common --override_module=rules_python=' >> .bazelrc"
      batch_commands:
        - "echo common --override_module=rules_python= >> .bazelrc"
      test_flags:
        # Minimum bazel supported C++
        - "--keep_going"
        - '--cxxopt=-std=c++17'
        - '--host_cxxopt=-std=c++17'
      build_targets:
        - "//..."
      test_targets:
        - "//..."
