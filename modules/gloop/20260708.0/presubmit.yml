matrix:
  platform:
  - debian13
  - ubuntu2404
  bazel:
  - 9.x
  - 8.x
tasks:
  verify_targets:
    name: Verify build targets
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets:
    - '@gloop//gloop/util/gtl:all'
bcr_test_module:
  module_path: gloop/examples
  matrix:
    platform:
    - debian13
    - ubuntu2404
    bazel:
    - 9.x
    - 8.x
  tasks:
    run_test_module:
      name: Run test module
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      build_targets:
      - @gloop_examples//example:all
      test_targets:
      - @gloop_examples//example:all
