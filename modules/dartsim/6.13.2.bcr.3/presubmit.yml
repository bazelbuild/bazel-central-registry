build_targets: &build_targets
  - '@dartsim//:dart-all'
  - '@dartsim//:dart-collision'
  - '@dartsim//:dart-collision-bullet'
  - '@dartsim//:dart-collision-core'
  - '@dartsim//:dart-collision-dart'
  - '@dartsim//:dart-collision-fcl'
  - '@dartsim//:dart-collision-ode'
  - '@dartsim//:dart-common'
  - '@dartsim//:dart-config'
  - '@dartsim//:dart-constraint'
  - '@dartsim//:dart-dynamics'
  - '@dartsim//:dart-external'
  - '@dartsim//:dart-integration'
  - '@dartsim//:dart-lcpsolver'
  - '@dartsim//:dart-math'
  - '@dartsim//:dart-optimizer'
  - '@dartsim//:dart-simulation'
  - '@dartsim//:dart-utils'
matrix:
  unix_platforms:
    - ubuntu2404
    - ubuntu2404_arm64
    - macos
    - macos_arm64
  windows_platforms:
    - windows
    - windows_arm64
  bazel:
    - 7.x
    - 8.x
    - 9.x
tasks:
  verify_targets_unix:
    name: Verify build targets on Unix
    platform: ${{ unix_platforms }}
    bazel: ${{ bazel }}
    build_flags:
      - '--cxxopt=-std=c++17'
      - '--host_cxxopt=-std=c++17'
    build_targets: *build_targets
  verify_targets_windows:
    name: Verify build targets on Windows
    platform: ${{ windows_platforms }}
    bazel: ${{ bazel }}
    build_flags:
      - '--cxxopt=/std:c++17'
      - '--host_cxxopt=/std:c++17'
      - '--cxxopt=/utf-8'
      - '--host_cxxopt=/utf-8'
      - '--cxxopt=/EHsc'
      - '--host_cxxopt=/EHsc'
      - '--cxxopt=/permissive-'
      - '--host_cxxopt=/permissive-'
      - '--cxxopt=/Zc:twoPhase-'
      - '--host_cxxopt=/Zc:twoPhase-'
      - '--cxxopt=/bigobj'
      - '--host_cxxopt=/bigobj'
    build_targets: *build_targets

