matrix:
  platform: ["debian11", "ubuntu2204", "macos_arm64"]
  bazel: ["9.x", "8.x", "7.x"]
tasks:
  verify_targets:
    name: "Verify targets"
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets:
      - "@rules_halide//:halide"
      - "@rules_halide//:gengen"
      - "@rules_halide//:runtime"
      - "@rules_halide//tests:simple_test"
    test_targets:
      - "@rules_halide//tests:simple_test"
