matrix:
  platform:
  - debian10
  - ubuntu2004
  - macos
  - macos_arm64
  - windows
  bazel:
  - 8.x
  - 7.x
  - 6.x
tasks:
  verify_targets:
    name: Verify build targets
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets:
    - '@capnprotocapnp'
    - '@capnprotocapnp-rpc'
    - '@capnprotocapnpc'
    - '@capnprotocapnp_tool'
    - '@capnprotocapnpc-c++'
    - '@capnprotocapnpc-capnp'
    - '@capnprotocapnp_runtime'
bcr_test_module:
  module_path: /src/capnp/BUILD.bazel
  matrix:
    platform:
    - debian10
    - ubuntu2004
    - macos
    - macos_arm64
    - windows
    bazel:
    - 8.x
    - 7.x
    - 6.x
  tasks:
    run_test_module:
      name: Run test module
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      build_targets:
      - any-test
      - blob-test
      - canonicalize-test
      - common-test
      - capability-test
      - compiler/lexer-test
      - compiler/type-id-test
      - dynamic-test
      - encoding-test
      - endian-test
      - ez-rpc-test
      - layout-test
      - membrane-test
      - message-test
      - orphan-test
      - reconnect-test
      - rpc-test
      - rpc-twoparty-test
      - schema-test
      - schema-loader-test
      - schema-parser-test
      - serialize-async-test
      - serialize-packed-test
      - serialize-test
      - serialize-text-test
      - stringify-test
