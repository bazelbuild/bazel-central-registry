bcr_test_module:
  module_path: "test_module"
  matrix:
    platform:
      - debian11
      - ubuntu2204
      - macos
    bazel: [7.x, 8.x, 9.x, rolling]
  tasks:
    run_test:
      name: Build and run N-API addon against node-addon-api
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      build_targets:
        - "@node_addon_api//:node_addon_api_headers_only"
        - "@node_addon_api//:node_addon_api"
      test_targets:
        - "//:addon_test"
