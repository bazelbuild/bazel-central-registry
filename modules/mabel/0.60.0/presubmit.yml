---
matrix:
  platform: ["ubuntu2004", "macos", "windows"]
  bazel: ["7.x", "8.x", "9.x"]
tasks:
  verify_mabel:
    name: "Build and Test Mabel"
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets:
      - "//..."
    test_targets:
      - "//..."
bcr_test_module:
  module_path: "examples/plain_java"
  matrix:
    platform: ["ubuntu2004", "macos", "windows"]
    bazel: ["7.x", "8.x", "9.x"]
  tasks:
    run_example:
      name: "Run plain_java example"
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      shell_commands:
        - "rm MODULE.bazel.lock || true"
      build_targets:
        - "//program:plain_java"
