---
# BCR Presubmit configuration for Mabel
# This file tells the BCR CI how to verify the module.
# It tests the main module targets and runs the plain_java example as an integration test.

matrix:
  platform: ["ubuntu2004", "macos", "windows"]
  bazel: ["7.x", "8.x"]
tasks:
  verify_mabel:
    name: "Build and Test Mabel"
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets:
      - "//..."
    test_targets:
      - "//..."
bcr_test_module:
  module_path: "examples/plain_java"
  matrix:
    platform: ["ubuntu2004", "macos", "windows"]
    bazel: ["7.x", "8.x"]
  tasks:
    run_example:
      name: "Run plain_java example"
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      build_targets:
        - "//program:plain_java"
