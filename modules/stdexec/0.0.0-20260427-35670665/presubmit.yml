matrix:
  platform:
  - ubuntu2204
  - macos
  - macos_arm64
  - windows
  bazel:
  - 7.x
  - 8.x
  - 9.x
  - rolling
tasks:
  verify_targets:
    name: Verify build targets
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets:
      - '@stdexec//:stdexec'
bcr_test_module:
  module_path: tests
  matrix:
    platform:
    - ubuntu2204
    - macos
    - macos_arm64
    bazel:
      - 7.x
      - 8.x
      - 9.x
      - rolling
  tasks:
    test_smoke:
      name: Test smoke consumer
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      test_targets:
        - //:smoke
