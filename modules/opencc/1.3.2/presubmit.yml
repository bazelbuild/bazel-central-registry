matrix:
  platform:
    - debian11
    - ubuntu2404_arm64
    - macos
    - macos_arm64
    - windows
    - windows_arm64
  bazel:
    - 8.x
    - 9.x
    - rolling
tasks:
  verify_targets:
    name: Verify build targets
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets:
      - "@opencc"
bcr_test_module:
  module_path: ""
  matrix:
    platform:
      - debian11
      - ubuntu2404_arm64
      - macos
      - macos_arm64
    bazel:
      - 8.x
      - 9.x
      - rolling
  tasks:
    run_test_module:
      name: Run test module
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      test_targets:
        - "@opencc//src/..."
        - "@opencc//data/..."
        - "@opencc//test/..."
        - "@opencc//node/test:node_test"
