matrix:
  platform:
    - debian11
    - ubuntu2204
    - macos
    - macos_arm64
    - windows
  bazel:
    - 8.x
tasks:
  verify_targets:
    name: Verify build targets
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets:
      - "@opencc"
bcr_test_module:
  module_path: ""
  matrix:
    platform:
      - debian11
      - ubuntu2204
      - macos
      - macos_arm64
    bazel:
      - 8.x
  tasks:
    run_test_module:
      name: Run test module
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      build_targets:
        - "@opencc//:opencc"
        - "@opencc//src/tools/..."
        - "@opencc//plugins/..."
        - "@opencc//node/..."
      test_flags:
        - "--skip_incompatible_explicit_targets"
      test_targets:
        - "@opencc//src/..."
        - "@opencc//data/..."
        - "@opencc//test/..."
        - "@opencc//python/..."
        - "@opencc//plugins/..."
        - "@opencc//node/test:node_test"
