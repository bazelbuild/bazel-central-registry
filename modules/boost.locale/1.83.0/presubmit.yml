matrix:
  platform:
    - debian13
    # Not supported due to a known bug.
    # See: https://github.com/bazelbuild/bazel-central-registry/pull/7045#issuecomment-3712750960
    # - macos_arm64
    - ubuntu2404
    - ubuntu2404_arm64
    - windows
  bazel: [7.x, 8.x, 9.x, rolling]
tasks:
  verify_targets:
    name: Verify build targets
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_flags:
      - '--process_headers_in_dependencies'
    build_targets:
      - '@boost.locale//:boost.locale'
