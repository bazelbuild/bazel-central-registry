matrix:
  platform:
  - debian11
  - ubuntu2004
  - ubuntu2004_arm64
  - ubuntu2204
  - ubuntu2404
  - macos
  - macos_arm64
  - windows
  bazel: [7.x, 8.x, 9.x]
tasks:
  verify_targets:
    name: Verify build targets (defaults)
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets:
    - '@sed//...'
    test_targets:
    - '@sed//...'
  verify_no_i18n:
    name: Verify build targets (--enable_i18n=False)
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_flags:
    - '--@sed//:enable_i18n=False'
    test_flags:
    - '--@sed//:enable_i18n=False'
    build_targets:
    - '@sed//...'
    test_targets:
    - '@sed//...'
  verify_no_threads:
    name: Verify build targets (--enable_threads=False)
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_flags:
    - '--@sed//:enable_threads=False'
    test_flags:
    - '--@sed//:enable_threads=False'
    build_targets:
    - '@sed//...'
    test_targets:
    - '@sed//...'
