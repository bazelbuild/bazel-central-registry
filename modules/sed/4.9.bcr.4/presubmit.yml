matrix: &matrix
  platform:
  - debian10
  - debian11
  - ubuntu2004
  - ubuntu2004_arm64
  - ubuntu2204
  - ubuntu2404
  - macos
  - macos_arm64
  bazel: [7.x, 8.x]
tasks:
  verify_targets:
    name: Verify build targets
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets:
    - '@sed//...'
    test_targets:
    - '@sed//...'
bcr_test_module:
  module_path: test_sed_llvm
  matrix: *matrix
  tasks:
    run_test_sed_llvm_module:
      name: Run test sed llvm module
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      build_targets: [//...]
      test_targets: [//...]
