bcr_test_module:
  module_path: "."

  matrix:
    platform: ["macos", "ubuntu2204", "windows"]
    bazel: ["8.x", "9.x", "rolling"]

  tasks:
    verify_targets:
      name: "Verify build targets"
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      test_targets:
        - '//...'
      test_flags:
        - '--repo_env=ACCEPTED_ANDROID_NDK_LICENSE_VERSION=r25c'
        - '--repo_env=ACCEPTED_ANDROID_SDK_LICENSE_VERSION=35'
        - '--android_platforms=@rules_android//:x86_64'
