matrix:
  platform:
    - debian10
    - debian13
    - debian13_arm64
    - rockylinux8
    - ubuntu2004
    - ubuntu2004_arm64
  bazel: ["7.x", "8.x", "9.x"]
tasks:
  verify_targets:
    name: "Build and test"
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets:
    - "@linuxptp//..."
    test_targets:
    - "@linuxptp//..."
  verify_with_openssl:
    name: "With OpenSSL"
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_flags:
    - "--@linuxptp//:crypto_backend=openssl"
    build_targets:
    - "@linuxptp//..."
    test_flags:
    - "--@linuxptp//:crypto_backend=openssl"
    test_targets:
    - "@linuxptp//..."
