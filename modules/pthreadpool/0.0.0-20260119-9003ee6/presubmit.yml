matrix:
  platform:
    - ubuntu2004
    - ubuntu2204
    - ubuntu2404
    - macos
    - macos_arm64
  bazel:
    - 7.x
    - 8.x
    - 9.x
    - rolling
tasks:
  verify_targets:
    name: Verify build targets
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_flags:
      - "--cxxopt=-std=c++17"
      - "--host_cxxopt=-std=c++17"
    build_targets:
      - "@pthreadpool//..."
  verify_targets_on_windows:
    name: Verify build targets
    platform: windows
    bazel: ${{ bazel }}
    build_flags:
      - "--cxxopt=/std:c++17"
      - "--host_cxxopt=/std:c++17"
    build_targets:
      - "@pthreadpool//..."

bcr_test_module:
  module_path: tests
  matrix:
    platform:
      - ubuntu2004
      - ubuntu2204
      - ubuntu2404
      - macos
      - macos_arm64
    bazel:
      - 7.x
      - 8.x
      - 9.x
      - rolling
  tasks:
    run_test_module:
      name: Run test module
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      build_flags:
        - "--cxxopt=-std=c++17"
        - "--host_cxxopt=-std=c++17"
      build_targets:
        - //...
      test_targets:
        - //...
    run_test_module_on_windows:
      name: Run test module
      platform: windows
      bazel: ${{ bazel }}
      build_flags:
        - "--cxxopt=/std:c++17"
        - "--host_cxxopt=/std:c++17"
      build_targets:
        - //...
      test_flags:
        - "--cxxopt=/std:c++17"
        - "--host_cxxopt=/std:c++17"
      test_targets:
        - //...
