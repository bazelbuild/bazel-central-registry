bcr_test_module:
  module_path: bcr_test_module
  matrix:
    platform: ["ubuntu2204", "ubuntu2404"]
    bazel: ["8.x"]
  tasks:
    run_test_module:
      name: "Consumer smoke test"
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      build_flags:
        - "--cxxopt=-std=c++20"
        - "--host_cxxopt=-std=c++20"
        - "--java_runtime_version=remotejdk_21"
        - "--tool_java_runtime_version=remotejdk_21"
      build_targets:
        - "@fourward//..."
        - "-@fourward//e2e_tests/..."
        - "-@fourward//examples/..."
