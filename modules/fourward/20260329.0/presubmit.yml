matrix:
  platform: ["ubuntu2204", "ubuntu2404"]
  bazel: ["7.x", "8.x", "9.x"]

tasks:
  verify_targets:
    name: "Verify build targets"
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_flags:
      # p4c (transitive dep) requires C++20.
      - "--cxxopt=-std=c++20"
      - "--host_cxxopt=-std=c++20"
      # Use hermetic remote JDK (the .bazelrc sets these, but BCR
      # presubmit doesn't load it).
      - "--java_runtime_version=remotejdk_21"
      - "--tool_java_runtime_version=remotejdk_21"
    build_targets:
      - "@fourward//..."
      - "-@fourward//e2e_tests/..."
      - "-@fourward//examples/..."
      - "-@fourward//tools/..."
