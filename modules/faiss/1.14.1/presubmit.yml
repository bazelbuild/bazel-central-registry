matrix:
  platform:
  - debian12
  - debian13
  - ubuntu2404
  - macos
  - macos_arm64
  bazel:
  - 8.x
  - 9.x
  - rolling
tasks:
  verify_targets:
    name: Verify CPU targets
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_flags:
    - '--cxxopt=-std=c++17'
    - '--host_cxxopt=-std=c++17'
    build_targets:
    - '@faiss//:faiss'
    - '@faiss//faiss:faiss'
bcr_test_module:
  module_path: tests
  matrix:
    platform:
    - macos
    - macos_arm64
    linux_platform:
    - debian12
    - debian13
    - ubuntu2404
    bazel:
    - 8.x
    - 9.x
    - rolling
  tasks:
    run_tests:
      name: Run tests
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      test_flags:
      - '--cxxopt=-std=c++17'
      - '--host_cxxopt=-std=c++17'
      test_targets:
      - '//...'
    run_tests_linux:
      # The Linux CI images ship no BLAS/LAPACK, which faiss needs at link
      # time; install OpenBLAS (the default of the @faiss//:blas label_flag).
      name: Run tests (system OpenBLAS)
      platform: ${{ linux_platform }}
      bazel: ${{ bazel }}
      shell_commands:
      - sudo apt-get update
      - sudo apt-get -y install libopenblas-dev
      test_flags:
      - '--cxxopt=-std=c++17'
      - '--host_cxxopt=-std=c++17'
      test_targets:
      - '//...'
