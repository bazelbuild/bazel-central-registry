matrix:
  # macOS + Ubuntu only — Debian's coverage overlaps Ubuntu's (both glibc
  # Linux), and our own CI doesn't test on it either, so the BCR cell only
  # adds runner cost without catching anything new. `macos_arm64` (not bare
  # `macos`, which still points at Intel runners) since rules_rs's macOS
  # Rust toolchains target arm64 by default.
  platform:
    - macos_arm64
    - ubuntu2204
  bazel:
    # bazelisk wildcard syntax accepts `<major>.x` / `<major>.*`, not
    # `<major>.<minor>.x` — `8.5.x` errors out with "invalid version".
    # The supported floor (rules_rs's) is 8.5.0; bazelisk's `8.x` resolves
    # to the latest 8.y, which currently is comfortably above.
    - 9.x
    - 8.x

tasks:
  verify_targets:
    name: Build the gazelle_py plugin
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    # BCR generates a thin consumer workspace and only honors flags listed
    # here — the module's own .bazelrc is not read. Every entry below
    # mirrors a flag from //.bazelrc that the hermetic @llvm toolchain
    # stack relies on; see that file for per-flag rationale. Consumers
    # have to mirror the same set in their own .bazelrc — see README.
    #
    # `--host_platform` in particular cannot live in a `common` rc line
    # because BCR shells out to `bazel info` before the build, and `info`
    # doesn't trigger bzlmod resolution — so referencing
    # @gazelle_py//... at that point fails with "Repository '@@gazelle_py'
    # is not defined". Passing it here scopes it to `bazel build`, by
    # which point the repo exists.
    build_flags:
      - "--host_platform=@gazelle_py//platforms:local_gnu"
      - "--repo_env=BAZEL_DO_NOT_DETECT_CPP_TOOLCHAIN=1"
      - "--repo_env=BAZEL_NO_APPLE_CPP_TOOLCHAIN=1"
      - "--@llvm//config:experimental_stub_libgcc_s=True"
      - "--linkopt=-no-pie"
    build_targets:
      # Go gazelle plugin (transitively cgo-links the Rust staticlib).
      - "@gazelle_py//py/..."
      # Rust crate — also exercised via py/, but listed explicitly so the
      # rlib variant + the proto codegen are covered on every platform.
      - "@gazelle_py//crates/import_extractor/..."
