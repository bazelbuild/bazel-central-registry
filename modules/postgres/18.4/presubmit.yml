matrix:
  platform:
    - debian13
    - debian13_arm64
    - macos_arm64
    - ubuntu2004
    - ubuntu2004_arm64
    - windows
  bazel: ["7.x", "8.x", "9.x"]
tasks:
  verify_targets:
    name: "Run test module"
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets:
    - "@postgres//..."
    test_targets:
    - "@postgres//..."
  minimal_build:
    name: "Minimal build (all optional deps off)"
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_flags:
    - "--@postgres//:with_ssl=none"
    build_targets:
    - "@postgres//..."
    test_flags:
    - "--@postgres//:with_ssl=none"
    test_targets:
    - "@postgres//..."
  maximal_build:
    name: "Maximal build (all BCR-resolved deps on)"
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_flags:
    - "--@postgres//:with_zlib=True"
    - "--@postgres//:with_lz4=True"
    - "--@postgres//:with_zstd=True"
    - "--@postgres//:with_libcurl=True"
    - "--@postgres//:with_readline=True"
    - "--@postgres//:enable_cassert=True"
    build_targets:
    - "@postgres//..."
    test_flags:
    - "--@postgres//:with_zlib=True"
    - "--@postgres//:with_lz4=True"
    - "--@postgres//:with_zstd=True"
    - "--@postgres//:with_libcurl=True"
    - "--@postgres//:with_readline=True"
    - "--@postgres//:enable_cassert=True"
    test_targets:
    - "@postgres//..."
