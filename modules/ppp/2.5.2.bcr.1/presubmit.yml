matrix:
  platform:
    - debian10
    - debian13
    - debian13_arm64
    - rockylinux8
    - ubuntu2004
    - ubuntu2004_arm64
  bazel: ["7.x", "8.x", "9.x"]
tasks:
  verify_targets:
    name: "Build and test with defaults"
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets:
    - "@ppp//..."
    test_targets:
    - "@ppp//..."
  verify_minimal:
    name: "Build with optional features disabled"
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_flags:
    - "--@ppp//:enable_microsoft_extensions=False"
    - "--@ppp//:enable_ipv6cp=False"
    - "--@ppp//:enable_plugins=False"
    - "--@ppp//:enable_eaptls=False"
    - "--@ppp//:enable_peap=False"
    - "--@ppp//:enable_filter=False"
    - "--@ppp//:enable_openssl=False"
    build_targets:
    - "@ppp//..."
    test_targets:
    - "@ppp//..."
