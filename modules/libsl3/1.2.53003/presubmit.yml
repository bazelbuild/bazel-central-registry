build_targets: &build_targets
  - "@libsl3//:sl3"

matrix: &matrix
  platform:
  - debian10
  - ubuntu2004
  - ubuntu2004_arm64
  - macos
  - macos_arm64
  - windows
  bazel: ["8.x", "9.x"]
tasks:
  verify_targets:
    name: "Verify build targets"
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets: *build_targets
bcr_test_module:
  module_path: "tests/bcr-consumer"
  matrix: *matrix
  tasks:
    run_tests:
      name: "Run bcr-consumer test"
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      test_targets:
      - "//..."
