bcr_test_module:
  module_path: examples/basic
  matrix:
    # add back "rolling" once rules_android_ndk depends on a rules_android
    # that has been updated to depend on bazel_worker_api v0.0.10+
    bazel: ["7.x", "8.x", "9.x"]
  tasks:
    run_test_module_ubuntu:
      name: "Verify build targets with bzlmod"
      platform: "ubuntu2004"
      bazel: ${{ bazel }}
      environment:
        ANDROID_NDK_HOME: /opt/android-ndk-r25b
      build_flags:
        - "--android_platforms=//:arm64-v8a"
      build_targets:
        - "//java/com/app:app"
    run_test_module_macos_arm64:
      name: "Verify build targets with bzlmod on MacOS arm64"
      platform: "macos_arm64"
      bazel: ${{ bazel }}
      environment:
        ANDROID_NDK_HOME: "/Users/buildkite/android-ndk-r25b"
      build_flags:
        - "--android_platforms=//:arm64-v8a"
      build_targets:
        - "//java/com/app:app"
    run_test_module_windows:
      name: "Verify build targets with bzlmod on Windows"
      platform: "windows"
      bazel: ${{ bazel }}
      environment:
        ANDROID_NDK_HOME: "c:/android_ndk/r25b"
        BAZELCI_LOCAL_RUN: true
      build_flags:
        - "--android_platforms=//:arm64-v8a"
      build_targets:
        - "//java/com/app:app"

