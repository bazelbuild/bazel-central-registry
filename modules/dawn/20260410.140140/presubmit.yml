matrix:
  bazel:
    - 7.x
    - 8.x
    - 9.x
    - rolling
tasks:
  verify_public_targets_macos:
    name: Verify public targets on macOS
    platform: macos_arm64
    bazel: ${{ bazel }}
    build_flags:
      - --cxxopt=-std=c++20
      - --@dawn//src/tint:tint_build_glsl_writer=false
      - --@dawn//src/tint:tint_build_hlsl_writer=false
      - --@dawn//src/tint:tint_build_msl_writer=true
      - --@dawn//src/tint:tint_build_null_writer=false
      - --@dawn//src/tint:tint_build_spv_reader=false
      - --@dawn//src/tint:tint_build_spv_writer=false
      - --@dawn//src/tint:tint_build_wgsl_reader=true
      - --@dawn//src/tint:tint_build_wgsl_writer=false
    build_targets:
      - "@dawn//:includes"
      - "@dawn//include/tint:headers"
      - "@dawn//src/tint/api:api"
      - "@dawn//src/tint/api/common:common"
      - "@dawn//src/dawn/native:webgpu_dawn"
  verify_public_targets_linux:
    name: Verify public targets on Linux
    platform: ubuntu2404
    bazel: ${{ bazel }}
    build_flags:
      - --cxxopt=-std=c++20
      - --@dawn//src/tint:tint_build_glsl_writer=false
      - --@dawn//src/tint:tint_build_hlsl_writer=false
      - --@dawn//src/tint:tint_build_msl_writer=false
      - --@dawn//src/tint:tint_build_null_writer=false
      - --@dawn//src/tint:tint_build_spv_reader=true
      - --@dawn//src/tint:tint_build_spv_writer=true
      - --@dawn//src/tint:tint_build_wgsl_reader=true
      - --@dawn//src/tint:tint_build_wgsl_writer=true
    build_targets:
      - "@dawn//:includes"
      - "@dawn//include/tint:headers"
      - "@dawn//src/tint/api:api"
      - "@dawn//src/tint/api/common:common"
      - "@dawn//src/dawn/native:webgpu_dawn"
  verify_public_targets_linux_arm64:
    name: Verify public targets on Linux arm64
    platform: ubuntu2404_arm64
    bazel: ${{ bazel }}
    build_flags:
      - --cxxopt=-std=c++20
      - --@dawn//src/tint:tint_build_glsl_writer=false
      - --@dawn//src/tint:tint_build_hlsl_writer=false
      - --@dawn//src/tint:tint_build_msl_writer=false
      - --@dawn//src/tint:tint_build_null_writer=false
      - --@dawn//src/tint:tint_build_spv_reader=true
      - --@dawn//src/tint:tint_build_spv_writer=true
      - --@dawn//src/tint:tint_build_wgsl_reader=true
      - --@dawn//src/tint:tint_build_wgsl_writer=true
    build_targets:
      - "@dawn//:includes"
      - "@dawn//include/tint:headers"
      - "@dawn//src/tint/api:api"
      - "@dawn//src/tint/api/common:common"
      - "@dawn//src/dawn/native:webgpu_dawn"
  verify_public_targets_windows:
    name: Verify public targets on Windows
    platform: windows
    bazel: ${{ bazel }}
    build_flags:
      - --cxxopt=/std:c++20
      - --@dawn//src/tint:os=win
      - --@dawn//src/tint:tint_build_glsl_writer=false
      - --@dawn//src/tint:tint_build_hlsl_writer=true
      - --@dawn//src/tint:tint_build_msl_writer=false
      - --@dawn//src/tint:tint_build_null_writer=false
      - --@dawn//src/tint:tint_build_spv_reader=false
      - --@dawn//src/tint:tint_build_spv_writer=false
      - --@dawn//src/tint:tint_build_wgsl_reader=true
      - --@dawn//src/tint:tint_build_wgsl_writer=true
    build_targets:
      - "@dawn//:includes"
      - "@dawn//include/tint:headers"
      - "@dawn//src/tint/api:api"
      - "@dawn//src/tint/api/common:common"
      - "@dawn//src/dawn/native:webgpu_dawn"

bcr_test_module:
  module_path: tests
  matrix:
    bazel:
      - 7.x
      - 8.x
      - 9.x
      - rolling
  tasks:
    test_module_macos:
      name: Run consumer smoke test on macOS
