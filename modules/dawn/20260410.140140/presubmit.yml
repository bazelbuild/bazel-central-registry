        - --@dawn//src/tint:tint_build_wgsl_reader=true
        - --@dawn//src/tint:tint_build_wgsl_writer=false
      build_targets:
        - //...
      test_flags:
        - --cxxopt=-std=c++20
        - --@dawn//src/tint:tint_build_glsl_writer=false
        - --@dawn//src/tint:tint_build_hlsl_writer=false
        - --@dawn//src/tint:tint_build_msl_writer=true
        - --@dawn//src/tint:tint_build_null_writer=false
