bcr_test_module:
  module_path: bcr/test_module
  matrix:
    platform:
      - ubuntu2004
      - macos
    bazel:
      - 9.x
  tasks:
    consumer_smoke_test:
      name: Consumer smoke test
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      build_targets:
        - //:codex_dev_manifest
        - //:claude_dev_manifest
      test_targets:
        - //:bcr_smoke_test

tasks:
  verify_dependency_targets:
    name: Verify dependency targets
    platform: ubuntu2004
    bazel: 9.x
    build_targets:
      - '@rules_agents//skills:rules_agents'
      - '@rules_agents//examples:codex_dev_manifest'
      - '@rules_agents//examples:claude_dev_auth_manifest'
