matrix:
  platform:
    - debian10
    - fedora40
    - ubuntu2004
    - windows
    - macos
  bazel:
    - 7.x
    - 8.x
    - 9.x
tasks:
  verify_targets:
    name: Verify build targets
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets:
      - "@sockpp//:sockpp"


bcr_test_module:
  module_path: "."
  matrix:
    platform:
      - debian10
      - fedora40
      - ubuntu2004
      - windows
      - macos
    bazel:
      - 7.x
      - 8.x
      - 9.x
  tasks:
    run_test_module:
      name: Run test module
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      build_targets:
        - "//..."
      test_targets:
        - "//..."
