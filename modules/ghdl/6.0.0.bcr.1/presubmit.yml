matrix:
  platform:
    - debian12
    - ubuntu2204
    - ubuntu2204_arm64
  bazel:
    - "7.x"
    - "8.x"
    - "9.x"
tasks:
  verify_targets:
    name: "Build and test GHDL"
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets:
      - "@ghdl//..."
    test_targets:
      - "@ghdl//..."
