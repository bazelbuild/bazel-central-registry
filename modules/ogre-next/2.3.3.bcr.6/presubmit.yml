matrix:
  linux_platform:
  - ubuntu2204
  - ubuntu2404
  bazel:
  - 8.x
  - 9.x
tasks:
  verify_linux_targets:
    name: Verify build targets (Linux)
    platform: ${{ linux_platform }}
    bazel: ${{ bazel }}
    build_targets:
    - '@ogre-next//:ogre-main'
    - '@ogre-next//:RenderSystem_GL3Plus.so'
    - '@ogre-next//:hlms_common'
    - '@ogre-next//:hlms_pbs'
    - '@ogre-next//:hlms_unlit'
    - '@ogre-next//:overlay'
  verify_macos_targets:
    name: Verify build targets (macOS)
    platform: macos_arm64
    bazel: ${{ bazel }}
    build_flags:
    # Required because openexr (a dependency of freeimage) uses std::filesystem::u8path,
    # which is only available on macOS 10.15+. Without this flag, Bazel defaults to macOS 10.11.
    - --macos_minimum_os=11.0
    build_targets:
    - '@ogre-next//:ogre-main'
    - '@ogre-next//:RenderSystem_GL3Plus.so'
    - '@ogre-next//:hlms_common'
    - '@ogre-next//:hlms_pbs'
    - '@ogre-next//:hlms_unlit'
    - '@ogre-next//:overlay'
