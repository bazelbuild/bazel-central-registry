matrix:
  platform:
    - debian10
    - macos_arm64
    - rockylinux8
    - ubuntu2004
    - ubuntu2004_arm64
    - windows
  bazel: ["7.x", "8.x", "9.x"]
tasks:
  verify_targets:
    name: "Verify build targets"
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets:
    - "@libyuv//..."
  verify_all_deps:
    name: "Verify all dependencies"
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_flags:
    - "--@libyuv//:with_jpeg=True"
    build_targets:
    - "@libyuv//..."
bcr_test_module:
  module_path: unit_test
  matrix:
    platform:
      - debian10
      - macos_arm64
      - ubuntu2004
      - ubuntu2004_arm64
      - windows
    bazel: ["7.x", "8.x", "9.x"]
  tasks:
    run_tests:
      name: "Run smoke tests"
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      test_targets:
      - "//..."
    run_tests_all_deps:
      name: "Run smoke tests"
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      test_flags:
        - "--@libyuv//:with_jpeg=True"
      test_targets:
      - "//..."
