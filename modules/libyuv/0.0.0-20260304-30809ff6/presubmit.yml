matrix:
  platform:
    - ubuntu2404
    - ubuntu2404_arm64
    - macos
    - macos_arm64
  bazel:
    - 9.x
tasks:
  verify_targets_default:
    name: Verify build targets (default)
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets:
      - '@libyuv'
  verify_targets_jpeg_disabled:
    name: Verify build targets (jpeg disabled)
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_flags:
      - --@libyuv//:enable_jpeg=false
    build_targets:
      - '@libyuv'
  verify_targets_fp_contract_fast_disabled:
    name: Verify build targets (fp contract fast disabled)
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_flags:
      - --@libyuv//:enable_fp_contract_fast=false
    build_targets:
      - '@libyuv'
  verify_targets_sve:
    name: Verify build targets (sve)
    platform:
      - ubuntu2404_arm64
      - macos_arm64
    bazel: ${{ bazel }}
    build_flags:
      - --@libyuv//:enable_sve=true
    build_targets:
      - '@libyuv'
  verify_targets_sve_sme:
    name: Verify build targets (sve + sme)
    platform:
      - ubuntu2404_arm64
      - macos_arm64
    bazel: ${{ bazel }}
    build_flags:
      - --@libyuv//:enable_sve=true
      - --@libyuv//:enable_sme=true
    build_targets:
      - '@libyuv'
bcr_test_module:
  module_path: tests
  matrix:
    platform:
      - ubuntu2404
      - ubuntu2404_arm64
      - macos
      - macos_arm64
    bazel:
      - 9.x
  tasks:
    build_test_module_default:
      name: Build sample project (default)
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      build_targets:
        - //:smoke
    build_test_module_jpeg_disabled:
      name: Build sample project (jpeg disabled)
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      build_flags:
        - --@libyuv//:enable_jpeg=false
      build_targets:
        - //:smoke
    build_test_module_fp_contract_fast_disabled:
      name: Build sample project (fp contract fast disabled)
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      build_flags:
        - --@libyuv//:enable_fp_contract_fast=false
      build_targets:
        - //:smoke
    build_test_module_sve:
      name: Build sample project (sve)
      platform:
        - ubuntu2404_arm64
        - macos_arm64
      bazel: ${{ bazel }}
      build_flags:
        - --@libyuv//:enable_sve=true
      build_targets:
        - //:smoke
    build_test_module_sve_sme:
      name: Build sample project (sve + sme)
      platform:
        - ubuntu2404_arm64
        - macos_arm64
      bazel: ${{ bazel }}
      build_flags:
        - --@libyuv//:enable_sve=true
        - --@libyuv//:enable_sme=true
      build_targets:
        - //:smoke
