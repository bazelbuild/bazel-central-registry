matrix:
  platform:
  - debian11
  - ubuntu2004
  - macos
  - macos_arm64
  bazel:
  - 7.x
  - 8.x
tasks:
  verify_targets:
    name: Verify build targets
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_flags:
    - '--cxxopt=-std=c++17'
    - '--host_cxxopt=-std=c++17'
    - '--features=-module_maps'
    build_targets:
    - '@opencensus-cpp//opencensus/...'
    - '-@opencensus-cpp//opencensus/exporters/...'

bcr_test_module:
  module_path: tests
  matrix:
    platform:
    - debian11
    - ubuntu2004
    - macos
    - macos_arm64
    bazel:
    - 7.x
    - 8.x
    - 9.x
    - rolling
  tasks:
    run_test_module:
      name: Run test module
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      build_flags:
      - '--cxxopt=-std=c++17'
      - '--host_cxxopt=-std=c++17'
      - '--features=-module_maps'
      build_targets:
      - //...
      test_targets:
      - //...
