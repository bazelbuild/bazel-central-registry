matrix:
  platform:
  - debian11
  - ubuntu2204
  - ubuntu2204_arm64
  - macos_arm64
  - windows
  bazel:
  - 9.x
  - 8.x
  - 7.x
tasks:
  verify_targets:
    name: Verify build targets
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets:
    - "@aom//..."
  verify_optional_deps:
    name: Verify optional deps
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_flags:
    - "--@aom//:CONFIG_LIBYUV=True"
    - "--@aom//:CONFIG_WEBM_IO=True"
    - "--@aom//:CONFIG_HIGHWAY=True"
    build_targets:
    - "@aom//..."
bcr_test_module:
  module_path: test
  matrix:
    platform:
    - debian11
    - ubuntu2204
    - ubuntu2204_arm64
    - macos_arm64
    # - windows
    bazel:
    - 9.x
    - 8.x
    - 7.x
  tasks:
    run_tests:
      name: "Run tests"
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      test_flags:
      - "--compilation_mode=opt"
      test_targets:
      - "//..."
    run_tests_with_deps:
      name: "Run tests with optional deps"
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      test_flags:
      - "--@aom//:CONFIG_LIBYUV=True"
      - "--@aom//:CONFIG_WEBM_IO=True"
      - "--@aom//:CONFIG_HIGHWAY=True"
      - "--compilation_mode=opt"
      test_targets:
      - "//..."
