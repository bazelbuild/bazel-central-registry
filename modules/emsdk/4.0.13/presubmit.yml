matrix:
  platform:
    - debian11
    - ubuntu2204
    - macos
    - macos_arm64
    - windows
  bazel:
    - 7.x
tasks:
  build_wasm_binary:
    name: Build wasm_binary
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets:
      - '@emsdk//emscripten_toolchain:wasm_binary'
bcr_test_module:
  module_path: "."
  matrix:
    platform:
    - debian11
    - ubuntu2204
    - macos
    - macos_arm64
    - windows
    bazel:
    - 7.x
    working_directory:
    - test_external
    - test_secondary_lto_cache
  tasks:
    run_test_module:
      name: Run test module
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      build_targets:
      - //...
      working_directory: ${{ working_directory }}
