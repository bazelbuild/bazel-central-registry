matrix:
  platform:
    - debian10
    - debian13
    - debian13_arm64
    - macos_arm64
    - rockylinux8
    - ubuntu2004
    - ubuntu2004_arm64
    - windows
  bazel: ["7.x", "8.x", "9.x"]
tasks:
  verify_targets:
    name: "Build and test"
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets:
    - "@mpfr//..."
    test_targets:
    - "@mpfr//..."
  verify_assert:
    name: "Test with assertions enabled"
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_flags:
    - "--@mpfr//:enable_assert=full"
    build_targets:
    - "@mpfr//..."
    test_flags:
    - "--@mpfr//:enable_assert=full"
    test_targets:
    - "@mpfr//..."
  verify_no_thread_safe:
    name: "Test with thread safety disabled"
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_flags:
    - "--@mpfr//:enable_thread_safe=False"
    build_targets:
    - "@mpfr//..."
    test_flags:
    - "--@mpfr//:enable_thread_safe=False"
    test_targets:
    - "@mpfr//..."
  verify_gmp_internals:
    name: "Test with GMP internals enabled"
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_flags:
    - "--@mpfr//:enable_gmp_internals=True"
    build_targets:
    - "@mpfr//..."
    test_flags:
    - "--@mpfr//:enable_gmp_internals=True"
    test_targets:
    - "@mpfr//..."
