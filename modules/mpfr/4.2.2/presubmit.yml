matrix:
  platform:
    - ubuntu2204
  bazel:
    - 8.x
    - 9.x
tasks:
  verify_targets:
    name: Verify build targets
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets:
      - '@mpfr//:mpfr'
bcr_test_module:
  module_path: bcr_test
  matrix:
    platform:
      - ubuntu2204
    bazel:
      - 8.x
      - 9.x
  tasks:
    run_tests:
      name: Run test module
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      test_targets:
        - //:mpfr_test
