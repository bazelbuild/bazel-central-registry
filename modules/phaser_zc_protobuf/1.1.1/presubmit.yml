matrix:
  platform:
  - macos_arm64
  - ubuntu2204
  bazel:
  - 8.x
  - 9.x
tasks:
  verify_targets:
    name: Verify build targets
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets:
    - '@phaser_zc_protobuf//phaser/compiler:phaser'
    - '@phaser_zc_protobuf//phaser/runtime:phaser_runtime'
bcr_test_module:
  module_path: .
  matrix:
    platform:
    - macos_arm64
    - ubuntu2204
    bazel:
    - 8.x
    - 9.x
  tasks:
    run_test_module:
      name: Run test module
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      test_targets:
      - //phaser:phaser_test
      - //phaser:active_message_test
      - //phaser:all_types_test
      - //phaser/runtime:message_test
      - //phaser/runtime:wireformat_test
