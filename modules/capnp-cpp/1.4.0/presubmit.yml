matrix:
  platform:
  - rockylinux8
  - debian10
  - ubuntu2004
  - macos
  - macos_arm64
  bazel:
  - 9.x
  - 8.x
  - 7.x
tasks:
  verify_targets:
    name: Verify build targets
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_flags:
    - '--cxxopt=-std=c++20'
    - '--host_cxxopt=-std=c++20'
    build_targets:
      '@capnp-cpp//...'
