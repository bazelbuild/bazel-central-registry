matrix:
  platform:
    - debian11
    - macos
    - ubuntu2204
  bazel:
    - 9.x
    - 8.x

tasks:
  verify_targets:
    name: Build the Go gazelle plugin
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_flags:
      - "--toolchain_resolution_debug=.*rust.*"
    build_targets:
      - "@gazelle_ts//ts/..."
