matrix:
  platform_linux:
    - ubuntu2204
    - ubuntu2404
    - ubuntu2404_arm64
    - debian11
  platform:
    - macos
    - macos_arm64
    - windows
  bazel: [7.x, 8.x, 9.x, rolling]

tasks:
  verify_linux_targets:
    name: Verify linux build targets
    platform: ${{ platform_linux }}
    bazel: ${{ bazel }}
    build_flags:
      - '--@sdl2//:opengl=False'
    build_targets:
      - '@sdl2'
      - '@sdl2//:test_chessboard'
  verify_targets:
    name: Verify build targets
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets:
      - '@sdl2'
      - '@sdl2//:test_chessboard'
