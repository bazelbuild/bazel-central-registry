matrix:
  bazel: [7.x, 8.x, 9.x, rolling]

tasks:
  # Linux disable OpenGL
  verify_targets_linux:
    name: Verify Linux
    platform:
      - ubuntu2204
      - ubuntu2404
      - ubuntu2404_arm64
      - debian11
    bazel: ${{ bazel }}
    build_flags:
      - "--@sdl2//:opengl=False"
    build_targets:
      - '@sdl2'
      - '@sdl2//:test_chessboard'

  verify_targets_others:
    name: Verify Others
    platform:
      - macos
      - macos_arm64
      - windows
    bazel: ${{ bazel }}
    build_targets:
      - '@sdl2'
      - '@sdl2//:test_chessboard'
