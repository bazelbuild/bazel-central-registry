matrix:
  unix_platform:
    - ubuntu2404
    - ubuntu2404_arm64
    - macos
    - macos_arm64
  windows_platform:
    - windows
    - windows_arm64
  bazel:
    - 7.x
    - 8.x
    - 9.x
tasks:
  unix_build:
    name: Verify build targets (Unix)
    platform: ${{ unix_platform }}
    bazel: ${{ bazel }}
    build_flags:
      - '--cxxopt=-std=c++17'
      - '--host_cxxopt=-std=c++17'
    build_targets:
      - '@freeimage//:freeimage'
      - '@freeimage//:freeimageplus'
  windows_build:
    name: Verify build targets (Windows)
    platform: ${{ windows_platform }}
    bazel: ${{ bazel }}
    build_flags:
      - '--cxxopt=/std:c++17'
      - '--host_cxxopt=/std:c++17'
    build_targets:
      - '@freeimage//:freeimage'
      - '@freeimage//:freeimageplus'

