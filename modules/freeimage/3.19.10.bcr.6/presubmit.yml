matrix:
  platform:
    - ubuntu2404
    - ubuntu2404_arm64
    - macos
    - macos_arm64
    - windows
    - windows_arm64
  bazel:
    - 7.x
    - 8.x
    - 9.x
tasks:
  verify_targets:
    name: Verify build targets
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_flags:
      - '--cxxopt=-std=c++17'
      - '--host_cxxopt=-std=c++17'
    build_targets:
      - '@freeimage//:freeimage'
      - '@freeimage//:freeimageplus'
