matrix:
  platform:
    - debian10
    - macos_arm64
    - rockylinux8
    - ubuntu2204
    - ubuntu2204_arm64
    - windows
  bazel: ["7.x", "8.x", "9.x"]
tasks:
  verify_targets:
    name: "Run test module"
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets:
    - "@libavif//..."
    test_targets:
    - "@libavif//..."
  verify_all_deps:
    name: "All optional dependencies enabled"
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_flags: &all_deps_flags
    - "--@libavif//:with_aom=True"
    - "--@libavif//:with_libyuv=True"
    build_targets:
    - "@libavif//..."
    test_flags: *all_deps_flags
    test_targets:
    - "@libavif//..."
