bcr_test_module:
  module_path: "e2e/smoke"
  matrix:
    platform: ["macos", "ubuntu2004"]
    bazel: ["8.x", "9.x"]
  tasks:
    run_test_module:
      name: "Run test module"
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      # Regenerate BUILD files with the published @aspect_gazelle_js, then build
      # and test the generated ts_project targets (tsc actually compiles).
      shell_commands:
        - "bazel run //:gazelle"
      build_targets:
        - "//..."
      test_targets:
        - "//..."
