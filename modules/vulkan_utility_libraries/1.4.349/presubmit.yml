matrix:
  platform:
    - ubuntu2404
    - ubuntu2404_arm64
    - macos_arm64
    - windows
  bazel:
    - 7.x
    - 8.x
    - 9.x
    - rolling
tasks:
  verify_targets:
    name: Verify public targets
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets:
      - '@vulkan_utility_libraries//:vulkan_utility_headers'
      - '@vulkan_utility_libraries//:vulkan_compiler_configuration'
      - '@vulkan_utility_libraries//:vulkan_layer_settings'
      - '@vulkan_utility_libraries//:vulkan_safe_struct'

bcr_test_module:
  module_path: tests
  matrix:
    platform:
      - ubuntu2404
      - ubuntu2404_arm64
      - macos_arm64
      - windows
    bazel:
      - 7.x
      - 8.x
      - 9.x
      - rolling
  tasks:
    run_test_module:
      name: Run test module
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      build_targets:
        - //...
      test_targets:
        - //...
