matrix:
  unix_platform:
  - ubuntu2404
  - ubuntu2404_arm64
  - macos
  - macos_arm64
  linux_platform:
  - ubuntu2404
  - ubuntu2404_arm64
  bazel:
  - 8.x
  - 9.x
tasks:
  verify_targets:
    name: Verify headless MuJoCo library
    platform: ${{ unix_platform }}
    bazel: ${{ bazel }}
    build_targets:
    - '@mujoco//:mujoco'
  verify_gui_targets:
    name: Verify MuJoCo GUI targets
    platform: ${{ linux_platform }}
    bazel: ${{ bazel }}
    build_targets:
    - '@mujoco//:mujoco_renderer'
    - '@mujoco//:simulate'
bcr_test_module:
  module_path: bcr_tests
  matrix:
    unix_platform:
    - ubuntu2404
    - ubuntu2404_arm64
    - macos
    - macos_arm64
    bazel:
    - 8.x
    - 9.x
  tasks:
    run_smoke_test:
      name: Run headless physics smoke test
      platform: ${{ unix_platform }}
      bazel: ${{ bazel }}
      test_targets:
      - '//...'
