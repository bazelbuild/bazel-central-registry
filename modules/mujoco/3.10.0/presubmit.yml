matrix:
  unix_platform:
  - ubuntu2404
  - ubuntu2404_arm64
  - macos
  - macos_arm64
  linux_platform:
  - ubuntu2404
  - ubuntu2404_arm64
  macos_platform:
  - macos
  - macos_arm64
  bazel:
  - 8.x
  - 9.x
  - rolling
tasks:
  verify_targets:
    name: Verify headless MuJoCo library
    platform: ${{ unix_platform }}
    bazel: ${{ bazel }}
    build_targets:
    - '@mujoco//:mujoco'
  verify_linux_gui_targets:
    name: Verify MuJoCo GUI targets on Linux
    platform: ${{ linux_platform }}
    bazel: ${{ bazel }}
    build_targets:
    - '@mujoco//:mujoco_renderer'
    - '@mujoco//:simulate'
  verify_macos_gui_targets:
    name: Verify MuJoCo GUI targets on macOS
    platform: ${{ macos_platform }}
    bazel: ${{ bazel }}
    build_targets:
    - '@mujoco//:mujoco_renderer'
    - '@mujoco//:simulate'
    build_flags:
    - '--repo_env=BAZEL_DO_NOT_DETECT_CPP_TOOLCHAIN=1'
bcr_test_module:
  module_path: test
  matrix:
    unix_platform:
    - ubuntu2404
    - ubuntu2404_arm64
    - macos
    - macos_arm64
    bazel:
    - 8.x
    - 9.x
    - rolling
  tasks:
    run_upstream_tests:
      name: Run upstream unit tests
      platform: ${{ unix_platform }}
      bazel: ${{ bazel }}
      test_targets:
      - '//...'
