matrix:
  platform:
  - debian11
  - ubuntu2204
  - macos
  - macos_arm64
  bazel:
  - 8.x
  - 7.x
tasks:
  verify_targets:
    name: Verify targets
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets:
    - '@rules_clojure//...'
    test_targets:
    - '@rules_clojure//...'
bcr_test_module:
  module_path: examples/simple
  matrix:
    platform:
    - debian11
    - ubuntu2204
    - macos
    - macos_arm64
    bazel:
    - 8.x
    - 7.x
  tasks:
    run_test_module:
      name: Run test module
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      build_targets:
      - "//..."
      test_targets:
      - "//..."
