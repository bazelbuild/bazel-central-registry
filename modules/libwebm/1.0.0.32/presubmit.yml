  matrix:
    platform:
      - ubuntu2404
      - ubuntu2404_arm64
      - macos
      - macos_arm64
    bazel:
      - 9.x
  tasks:
    build_test_module:
      name: Build sample project
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      build_targets:
        - //:smoke
