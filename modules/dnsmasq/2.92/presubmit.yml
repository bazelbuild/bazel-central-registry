matrix:
  platform:
    - debian10
    - debian13
    - debian13_arm64
    - macos_arm64
    - rockylinux8
    - ubuntu2004
    - ubuntu2004_arm64
  bazel: ["7.x", "8.x", "9.x"]
tasks:
  verify_targets:
    name: "Verify default build"
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets: &targets
    - "@dnsmasq//..."
    test_targets: *targets
  verify_all_features_disabled:
    name: "Verify build with all default features disabled"
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_flags:
    - "--@dnsmasq//:dhcp=False"
    - "--@dnsmasq//:dhcp6=False"
    - "--@dnsmasq//:tftp=False"
    - "--@dnsmasq//:script=False"
    - "--@dnsmasq//:auth=False"
    - "--@dnsmasq//:ipset=False"
    - "--@dnsmasq//:loop=False"
    - "--@dnsmasq//:dumpfile=False"
    - "--@dnsmasq//:inotify=False"
    - "--@dnsmasq//:largefile=False"
    build_targets: *targets
    test_targets: *targets
