matrix:
  platform:
  - debian11
  - ubuntu2204
  - macos_arm64
  bazel:
  - 9.x
  - 8.x
  - 7.x
tasks:
  verify_targets:
    name: Verify build targets
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets:
    - '@gazelle_rust//:gazelle_bin'
    - '@gazelle_rust//rust_language'
    - '@gazelle_rust//macro'
bcr_test_module:
  module_path: example
  matrix:
    platform:
    - debian11
    - ubuntu2204
    - macos_arm64
    bazel:
    - 9.x
    - 8.x
    - 7.x
  tasks:
    run_test_module:
      name: Run test module
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      build_targets:
      - //:gazelle
