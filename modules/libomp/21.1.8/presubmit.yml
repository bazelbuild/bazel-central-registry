bcr_test_module:
  module_path: examples
  matrix:
    platform:
      - debian11
      - ubuntu2204
      - fedora40
      - ubuntu2204_arm64
      - macos
      - macos_arm64
      - windows
    bazel:
      - 7.x
      - 8.x
  tasks:
    run_test_module:
      name: Build and test libomp examples
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      build_targets:
        - //...
      test_targets:
        - //...
      build_flags:
        - -c opt
      test_flags:
        - -c opt
    run_wasm_tests:
      name: Build and test wasm targets
      platform: ubuntu2204
      bazel: 8.x
      build_targets:
        - //...
      test_targets:
        - //...
      build_flags:
        - --config=wasm
        - -c opt
      test_flags:
        - --config=wasm
        - -c opt
