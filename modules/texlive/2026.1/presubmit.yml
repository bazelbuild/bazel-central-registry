matrix:
  platform:
    - debian13
    - debian13_arm64
    - macos_arm64
    - ubuntu2004
    - ubuntu2004_arm64
    - windows
  # Bazel 7 BEP upload rejects the texmf NamedSetOfFiles events as
  # INVALID_ARGUMENT (the texmf filegroup enumerates ~700k inputs).
  # Drop 7.x rather than restructure for it.
  bazel: ["8.x", "9.x"]
tasks:
  verify_targets:
    name: "Build and test"
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets:
    - "@texlive//..."
    test_targets:
    - "@texlive//..."
