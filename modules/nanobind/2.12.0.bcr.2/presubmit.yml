matrix: &matrix
  platform:
  - debian10
  - debian12
  - debian13
  - ubuntu2204
  - ubuntu2404
  - macos
  - macos_arm64
  - windows
  platform_non_windows:
  - debian10
  - debian12
  - debian13
  - ubuntu2204
  - ubuntu2404
  - macos
  - macos_arm64
  bazel:
  - 8.x
  - 9.x
tasks:
  verify_targets:
    name: Verify build targets
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_flags: &build_flags
    - '--process_headers_in_dependencies'
    build_targets: &build_targets
    - '@nanobind//:nanobind'
  verify_targets_bazel_7_windows:
    name: Verify build targets (Bazel 7, Windows)
    platform: windows
    bazel: 7.x
    build_flags:
    - '--process_headers_in_dependencies'
    # When using Bazel 7.x, unless the root module loads rules_cc (of any
    # version) then Bazel ignores nanobind's MVS rules_cc version that
    # guarantees C++17 support, so for the anonymous module test we need
    # to force the standard version.
    - '--cxxopt=/std:c++17'
    build_targets: *build_targets
  verify_targets_bazel_7_non_windows:
    name: Verify build targets (Bazel 7, non-Windows)
    platform: ${{ platform_non_windows }}
    bazel: 7.x
    build_flags: &bazel_7_non_windows_build_flags
    - '--process_headers_in_dependencies'
    # When using Bazel 7.x, unless the root module loads rules_cc (of any
    # version) then Bazel ignores nanobind's MVS rules_cc version that
    # guarantees C++17 support, so for the anonymous module test we need
    # to force the standard version.
    - '--cxxopt=--std=c++17'
    build_targets: *build_targets

bcr_test_module:
  module_path: "."
  matrix: *matrix
  tasks:
    run_tests:
      name: "Run test module"
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      build_flags: *build_flags
      test_targets: &test_targets
      - "//..."
    run_tests_bazel_7_windows:
      name: "Run test module (Bazel 7, Windows)"
      platform: windows
      bazel: 7.x
      build_flags: *build_flags
      test_targets: *test_targets
    run_tests_bazel_7_non_windows:
      name: "Run test module (Bazel 7, non-Windows)"
      platform: ${{ platform_non_windows }}
      bazel: 7.x
      build_flags: *bazel_7_non_windows_build_flags
      test_targets: *test_targets
