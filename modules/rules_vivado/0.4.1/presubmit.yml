bcr_test_module:
  # `examples/` is structured as an external-consumer would author it (its
  # own MODULE.bazel, toolchain registration, hello-world synth target).
  # The BCR runner injects the version-under-test in place of the
  # `local_path_override` so each release is shaken out through the same
  # surface a downstream consumer uses.
  module_path: "examples"
  matrix:
    platform:
      - debian11
      - ubuntu2204
    bazel: [7.x, 8.x, 9.x]
  tasks:
    run_tests:
      name: "Run tests"
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      build_flags:
        # BCR runners don't ship Vivado — we exercise analysis (toolchain
        # resolution, attr validation, rule impl, macro expansion) without
        # actually invoking the binary.
        - "--nobuild"
      build_targets:
        - "//..."
