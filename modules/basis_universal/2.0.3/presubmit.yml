matrix:
  platform:
    - debian10
    - debian13
    - debian13_arm64
    - macos_arm64
    - rockylinux8
    - ubuntu2004
    - ubuntu2004_arm64
    - windows
  bazel: ["7.x", "8.x", "9.x"]
tasks:
  verify_targets:
    name: "Run test module"
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets:
    - "@basis_universal//..."
    test_targets:
    - "@basis_universal//..."
  verify_enable_all:
    name: "Enable all flags"
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_flags:
    - "--@basis_universal//:sse=True"
    - "--@basis_universal//:zstd=True"
    - "--@basis_universal//:opencl=True"
    test_flags:
    - "--@basis_universal//:sse=True"
    - "--@basis_universal//:zstd=True"
    - "--@basis_universal//:opencl=True"
    build_targets:
    - "@basis_universal//..."
    test_targets:
    - "@basis_universal//..."
  verify_disable_all:
    name: "Disable all flags"
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_flags:
    - "--@basis_universal//:sse=False"
    - "--@basis_universal//:zstd=False"
    - "--@basis_universal//:opencl=False"
    test_flags:
    - "--@basis_universal//:sse=False"
    - "--@basis_universal//:zstd=False"
    - "--@basis_universal//:opencl=False"
    build_targets:
    - "@basis_universal//..."
    test_targets:
    - "@basis_universal//..."
