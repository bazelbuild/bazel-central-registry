matrix:
  bazel: [7.x, 8.x, 9.x]
  platform:
    - debian13
    - ubuntu2404
tasks:
  verify_targets:
    name: Verify FBThrift targets
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_flags:
      - "--incompatible_autoload_externally=+@rules_cc"
      - "--cxxopt=-std=c++20"
      - "--host_cxxopt=-std=c++20"
    build_targets:
      - "@fbthrift//:frozen"
      - "@fbthrift//:protocol"
      - "@fbthrift//:thrift1"
