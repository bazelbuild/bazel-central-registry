bcr_test_module:
  module_path: "integration"
  matrix:
    platform: ["ubuntu2204"]
    bazel: ["8.x", "9.x"]
  tasks:
    run_tests:
      name: "Run test module"
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      test_targets:
        - "//..."
    verify_targets:
      name: "Verify the dtc toolchain builds"
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      build_targets:
        - "@dtc//:dtc"
