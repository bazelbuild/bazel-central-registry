matrix:
  platform:
    - debian13
    - ubuntu2404
    - macos_arm64
  bazel:
    - 9.x
    - 8.x
tasks:
  verify_targets:
    name: Verify build targets
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets:
      - "@libcreate"
      - "@libcreate//:battery_level"
      - "@libcreate//:bumpers"
      - "@libcreate//:cliffs"
      - "@libcreate//:drive_circle"
      - "@libcreate//:leds"
      - "@libcreate//:packets"
      - "@libcreate//:play_song"
      - "@libcreate//:wheeldrop"
    test_targets:
      - "@libcreate//:create_test"
      - "@libcreate//:data_test"
      - "@libcreate//:packet_test"
      - "@libcreate//:robot_model_test"
      - "@libcreate//:serial_query_test"
      - "@libcreate//:serial_stream_test"
