matrix:
  bazel:
  - 7.x
  - 8.x
  - 9.x
  platform:
  - debian11
  - ubuntu2204
tasks:
  verify_targets:
    name: Verify build targets
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets:
    - '@bazel_iwyu//:iwyu_opts'
    - '@bazel_iwyu//:iwyu_mappings'
    - '@bazel_iwyu//:fix_includes'
    - '@bazel_iwyu//bazel/iwyu:run_iwyu'
bcr_test_module:
  module_path: tests/integration/test_workspace
  matrix:
    platform:
    - debian11
    - ubuntu2204
    bazel:
    - 7.x
    - 8.x
    - 9.x
  tasks:
    run_test_module:
      name: Run test module
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      build_targets:
      - ':main'
