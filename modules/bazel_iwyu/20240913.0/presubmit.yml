matrix:
  bazel:
  - 7.x
  - 8.x
  - 9.x
  platform:
  - debian11
  - ubuntu2204
tasks:
  verify_targets:
    name: Verify build targets
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets:
    - '@bazel_iwyu//:iwyu_opts'
    - '@bazel_iwyu//:iwyu_mappings'
    - '@bazel_iwyu//bazel/iwyu:run_iwyu'
