build_targets: &build_targets
  - "@ogre//..."
matrix:
  unix_platforms:
    - ubuntu2404
    - ubuntu2404_arm64
    - macos
    - macos_arm64
  windows_platforms:
    - windows
    - windows_arm64
  bazel:
    - 7.x
    - 8.x
    - 9.x
tasks:
  verify_targets_unix:
    name: Verify build targets on Unix
    platform: ${{ unix_platforms }}
    bazel: ${{ bazel }}
    build_flags:
      - "--cxxopt=-std=c++17"
      - "--host_cxxopt=-std=c++17"
    build_targets: *build_targets
  verify_targets_windows:
    name: Verify build targets on Windows
    platform: ${{ windows_platforms }}
    bazel: ${{ bazel }}
    build_flags:
      - "--cxxopt=/std:c++17"
      - "--host_cxxopt=/std:c++17"
    build_targets: *build_targets
