matrix: &matrix
  platform:
    - ubuntu2004
    - ubuntu2204
    - ubuntu2404
    - ubuntu2404_arm64
    - debian13_arm64
    - macos_arm64
  bazel: ["7.x", "8.x", "9.x"]
tasks:
  verify_targets:
    name: Verify build targets
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets:
      - "@yosys//:yosys"
bcr_test_module:
  module_path: ""
  matrix: *matrix
  tasks:
    run_test_module:
      name: Run test module
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      test_flags:
        - "--verbose_failures"
      test_targets:
        - "@yosys//..."
