matrix:
  platform:
  - debian10
  - debian11
  - debian12
  - debian13
  - macos
  - windows
  bazel:
  - 8.x
  - 7.x
tasks:
  verify_unix:
    name: Verify build targets
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets:
    - '@pbrt_proto//pbrt_proto:pbrt_proto'
    - '@pbrt_proto//pbrt_proto:pbrt_cc_proto'
    - '@pbrt_proto//pbrt_proto/v3:convert'
    - '@pbrt_proto//pbrt_proto/v3:defaults_binpb'
    - '@pbrt_proto//pbrt_proto/v3:defaults_cc_proto'
    - '@pbrt_proto//pbrt_proto/v3:defaults_proto'
    - '@pbrt_proto//pbrt_proto/v3:v3_cc_proto'
    - '@pbrt_proto//pbrt_proto/v3:v3_proto'
    - '@pbrt_proto//tools:pbrt_proto_converter'
