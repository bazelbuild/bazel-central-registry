matrix:
  platform:
  - debian10
  - debian12
  - debian13
  - ubuntu2204
  - ubuntu2404
  - macos
  - macos_arm64
  - windows
  bazel:
  - 9.x
  - 8.x
  build_flags: &build_flags
  - []
  - ["--@libzip//:enable_openssl=False"]
  - ["--@libzip//:enable_bzip2=False"]
  - ["--@libzip//:enable_lzma=False"]
  - ["--@libzip//:enable_zstd=False"]
tasks:
  build_test:
    name: Build library
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets: &build_targets
    - "@libzip//:all"
    test_targets: &test_targets
    - "@libzip//examples:all"
    build_flags: ${{ build_flags }}
    test_flags: ${{ build_flags }}
  build_test_bazel_7_non_windows:
    name: Build library (Bazel 7, non-Windows, no option flags)
    platform: debian10
    bazel: 7.x
    build_targets: *build_targets
    test_targets: *test_targets
    # When using Bazel 7.x, unless the root module loads rules_cc (of any
    # version) then Bazel ignores libzip's MVS rules_cc version that guarantees
    # C++17 support, so for the anonymous module test we need to force the
    # standard version.
    build_flags:
    - "--cxxopt=--std=c++17"
    test_flags:
    - "--cxxopt=--std=c++17"
  build_test_bazel_7_windows:
    name: Build library (Bazel 7, Windows, no option flags)
    platform: windows
    bazel: 7.x
    build_targets: *build_targets
    test_targets: *test_targets
    build_flags:
    - "--cxxopt=/std:c++17"
    test_flags:
    - "--cxxopt=/std:c++17"
bcr_test_module:
  module_path: verify_generated_code
  tasks:
    verify_generated_code:
      name: Verify generated code
      platform: ubuntu2404
      bazel: 9.x
      test_targets:
      - //:verify_generated_code
