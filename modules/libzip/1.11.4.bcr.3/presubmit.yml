matrix:
  platform:
  - debian10
  - debian12
  - debian13
  - ubuntu2204
  - ubuntu2404
  - macos
  - macos_arm64
  - windows
  bazel:
  - 9.x
  - 8.x
  - 7.x
  build_flags:
  - []
  - ["--@libzip//:enable_openssl=False"]
  - ["--@libzip//:enable_bzip2=False"]
  - ["--@libzip//:enable_lzma=False"]
  - ["--@libzip//:enable_zstd=False"]
tasks:
  build_test:
    name: Build library
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_flags: ${{ build_flags }}
    build_targets:
    - "@libzip//:all"
    test_targets:
    - "@libzip//examples:all"
  verify_generated_code:
    name: Verify generated code
    platform: ubuntu2404
    bazel: 9.x
    test_targets:
    - "@libzip//test:verify_generated_code"
