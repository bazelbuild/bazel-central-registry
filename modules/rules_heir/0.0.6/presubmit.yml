matrix:
  platform: ["ubuntu2404", "macos_arm64", "ubuntu2404_arm64"]
  bazel: ["7.x", "8.x", "9.x"]

tasks:
  test_analysis:
    name: "Run Analysis Tests"
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    test_targets:
      - "@rules_heir//heir/..."

bcr_test_module:
  module_path: "examples/lattigo"
  matrix:
    platform: ["ubuntu2404", "macos_arm64", "ubuntu2404_arm64"]
    bazel: ["7.x", "8.x", "9.x"]
  tasks:
    test_lattigo_example:
      name: "Test Lattigo Example"
      platform: ${{ platform }}
      shell_commands:
      - if [ "$(uname)" = "Linux" ]; then sudo apt-get update && sudo apt-get install libomp5 -y; fi
      bazel: ${{ bazel }}
      test_targets:
        - "//...:all"
