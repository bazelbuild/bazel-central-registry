matrix:
  platform: ["debian11", "ubuntu2204"]
  bazel: ["7.x", "8.x", "9.x"]

tasks:
  test_hello_world:
    name: "Test Hello World Example"
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    bcr_test_module:
      module_path: "examples/hello_world"
      test_targets:
        - "//...:all"

  test_analysis:
    name: "Run Analysis Tests"
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    test_targets:
      - "@rules_heir//heir/..."
