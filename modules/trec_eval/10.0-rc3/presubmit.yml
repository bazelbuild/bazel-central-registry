matrix:
  platform:
  - debian11
  - ubuntu2204
  - macos
  - macos_arm64
  bazel:
  - 7.x
  - 8.x
  - rolling
tasks:
  verify_targets:
    name: Verify build targets
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets:
    - '@trec_eval//:trec_eval'
    - '@trec_eval//:trec_eval_lib'
bcr_test_module:
  module_path: test
  matrix:
    platform:
    - debian11
    - ubuntu2204
    - macos
    - macos_arm64
    bazel:
    - 7.x
    - 8.x
    - rolling
  tasks:
    run_quicktest:
      name: Run quicktest
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      test_targets:
      - '//:quicktest'
