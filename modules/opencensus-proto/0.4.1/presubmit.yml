matrix:
  platform:
  - debian10
  - ubuntu2004
  - macos
  - macos_arm64
  - windows
  bazel:
  - 7.x
  - 6.x
tasks:
  verify_targets:
    name: Verify build targets
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets:
    - '@opencensus-proto//opencensus/proto/metrics/...'
    - '@opencensus-proto//opencensus/proto/resource/...'
    - '@opencensus-proto//opencensus/proto/stats/...'
    - '@opencensus-proto//opencensus/proto/trace/...'
