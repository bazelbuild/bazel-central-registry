matrix:
  unix_platform:
    - debian12
    - debian13
    - macos
    - macos_arm64
    - ubuntu2404
  windows_platform:
    - windows
  bazel: ["7.x", "8.x", "9.x"]
tasks:
  unix_presubmit:
    name: Unix Presubmit
    platform: ${{ unix_platform }}
    bazel: ${{ bazel }}
    build_flags:
      - '--process_headers_in_dependencies'
      - '--cxxopt=-std=c++17'
    build_targets:
      - '@cpp-httplib//...'
  windows_presubmit:
    name: Windows Presubmit
    platform: ${{ windows_platform }}
    bazel: ${{ bazel }}
    build_flags:
      - '--process_headers_in_dependencies'
      - '--cxxopt=/std:c++17'
      - '--cxxopt=/D_WIN32_WINNT=0x0A00'
    build_targets:
      - '@cpp-httplib//...'
bcr_test_module:
  module_path: sample
  matrix:
    unix_platform:
      - debian12
      - debian13
      - macos
      - macos_arm64
      - ubuntu2404
    bazel: ["7.x", "8.x", "9.x"]
  tasks:
    run_test_module:
      name: Run test module
      platform: ${{ unix_platform }}
      bazel: ${{ bazel }}
      test_targets:
        - //...
