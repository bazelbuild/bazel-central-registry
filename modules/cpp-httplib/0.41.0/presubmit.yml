matrix:
  unix_platform:
    - debian12
    - debian13
    - macos
    - macos_arm64
    - ubuntu2404
  windows_platform:
    - windows
  bazel: ["7.x", "8.x", "9.x"]
tasks:
  unix_presubmit:
    name: Unix Presubmit
    platform: ${{ unix_platform }}
    bazel: ${{ bazel }}
    build_flags:
      - '--process_headers_in_dependencies'
      - '--cxxopt=-std=c++17'
    build_targets:
      - '@cpp-httplib//...'
  windows_presubmit:
    name: Windows Presubmit
    platform: ${{ windows_platform }}
    bazel: ${{ bazel }}
    build_flags:
      - '--process_headers_in_dependencies'
      - '--cxxopt=/std:c++17'
    build_targets:
      - '@cpp-httplib//...'
