matrix:
  platform:
    - ubuntu2404
    - ubuntu2404_arm64
    - macos
    - macos_arm64
    # Windows will only work when rules_foreign_cc is updated to fix the load
    # statement for cc_import when running on windows systems.
    # - windows
    # - windows_arm64
  bazel:
    - 7.x
    - 8.x
    - 9.x
tasks:
  verify_targets:
    name: Verify build targets
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets:
      - "@libzmq//:libzmq"
