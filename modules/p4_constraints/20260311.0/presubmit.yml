matrix:
  platform: ["ubuntu2204", "ubuntu2404"]
  bazel: [7.x, 8.x, 9.x]

tasks:
  verify_targets:
    name: "Verify build targets"
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_flags:
      - "--cxxopt=-std=c++20"
      - "--host_cxxopt=-std=c++20"
    build_targets:
      - "@p4_constraints//..."
