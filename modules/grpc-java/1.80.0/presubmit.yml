bcr_test_module:
  module_path: bcr_test_module
  matrix:
    platform: ["debian10", "macos", "ubuntu2004", "windows"]
    bazel: ["7.x", "8.x", "9.x"]
  tasks:
    run_test_module:
      name: Run test module
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      build_targets:
      - '@grpc-java//:java_grpc_library__external_repo_test'
