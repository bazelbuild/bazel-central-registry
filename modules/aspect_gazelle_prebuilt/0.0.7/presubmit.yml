matrix:
  platform: ["macos", "ubuntu2004"]
  bazel: ["8.x", "9.x"]
tasks:
  verify_targets:
    name: "Verify build targets"
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets:
      - "@aspect_gazelle_prebuilt//:gazelle_prebuilt_bin"
bcr_test_module:
  module_path: "e2e/bin"
  matrix:
    platform: ["macos", "ubuntu2004"]
    bazel: ["8.x", "9.x"]
  tasks:
    run_test_module:
      name: "Run test module"
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      build_targets:
        - "//..."
