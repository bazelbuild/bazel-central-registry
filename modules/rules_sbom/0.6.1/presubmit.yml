matrix:
  platform: ["debian11", "macos", "ubuntu2204", "windows"]
  bazel: ["7.x", "8.x"]

tasks:
  verify_targets:
    name: Verify build targets
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets:
      - "@rules_sbom//sbom/..."
      - "@rules_sbom//toolchains/..."

bcr_test_module:
  module_path: "e2e/smoke"
  matrix:
    platform: ["debian11", "macos", "ubuntu2204", "windows"]
    bazel: ["7.x", "8.x"]
  tasks:
    run_test_module:
      name: Run smoke test
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      build_targets:
        - "//:hello_sbom"
