matrix:
  # Bazel 7.x is intentionally absent: the pinned protobuf (34.1) no longer
  # analyzes on Bazel 7.x, so the module's floor is Bazel 8.
  bazel:
  - 8.x
  - 9.x
  platform:
  - ubuntu2404
  - macos_arm64
tasks:
  verify_targets:
    name: Verify build targets
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_flags:
    - '--cxxopt=-std=c++20'
    #bazel query 'kind(cc_binary,//...) - rdeps(//mbo/mope:mope,//...)'
    build_targets:
      - '@helly25_proto//mbo/proto:matchers_test'
      - '@helly25_proto//mbo/proto:parse_text_proto_test'
