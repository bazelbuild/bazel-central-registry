bcr_test_module:
  module_path: "examples/node_version_pin"
  matrix:
    platform: ["ubuntu2204", "macos", "windows"]
    bazel: ["7.x", "8.x", "9.x"]
  tasks:
    run_tests:
      name: "Run test module"
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      test_targets:
        - "//..."
bcr_test_module_full:
  module_path: "examples/full"
  matrix:
    platform: ["ubuntu2204", "macos"]
    bazel: ["7.x", "8.x", "9.x"]
  tasks:
    run_tests:
      name: "Run full test module"
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      test_targets:
        - "//..."
