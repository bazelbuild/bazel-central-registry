bcr_test_module:
  module_path: ""
  matrix:
    platform:
      - debian11
      - ubuntu2204
    bazel: [7.x, 8.x]
  tasks:
    build_targets:
      name: Build elfutils libraries
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      build_targets:
        - "@elfutils//:elf"
        - "@elfutils//:dw"
        - "@elfutils//:libelf"
        - "@elfutils//:libdw"
