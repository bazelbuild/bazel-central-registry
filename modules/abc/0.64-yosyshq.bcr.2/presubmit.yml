bcr_test_module:
  module_path: ""
  matrix:
    platform: ["ubuntu2004", "ubuntu2004_arm64", "macos_arm64"]
    bazel: ["7.x", "8.x", "9.x"]
  tasks:
    verify_targets:
      name: "Run test module"
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      build_targets:
      - "//..."
    verify_no_readline_targets:
      name: "Run no readline tests"
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      build_flags:
      - "--//:use_readline=False"
      build_targets:
      - "//..."
