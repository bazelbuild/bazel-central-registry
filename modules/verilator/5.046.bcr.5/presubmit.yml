matrix:
  platform:
    - "ubuntu2204"
    - "ubuntu2204_arm64"
    - "macos_arm64"
    - "windows"
  bazel: ["7.*", "8.*", "9.*"]
tasks:
  verify_targets:
    name: "Run test module"
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets:
      - "@verilator//..."
    test_targets:
      - "@verilator//..."
  verify_targets_with_timing:
    name: "Run test module with timing enabled"
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_flags:
      - "--@verilator//:timing=true"
    build_targets:
      - "@verilator//..."
    test_targets:
      - "@verilator//..."
