matrix:
  linux_platform:
  - debian11
  - ubuntu2204
  mac_platform:
  - macos
  bazel: ["7.x", "8.x", "9.x", "rolling"]
tasks:
  verify_targets_linux:
    name: Verify build targets on Linux
    platform: ${{ linux_platform }}
    bazel: ${{ bazel }}
    build_targets:
    - '@harfbuzz'
    build_flags:
    - "--cxxopt=-std=c++20"
    - "--incompatible_disallow_empty_glob=false"
  verify_targets_macos:
    name: Verify build targets on macOS
    platform: ${{ mac_platform }}
    bazel: ${{ bazel }}
    build_targets:
    - '@harfbuzz'
    build_flags:
    - "--cxxopt=-std=c++20"
    - "--incompatible_disallow_empty_glob=false"
  verify_targets_macos_with_glib:
    name: Verify build targets on macOS with GLib
    platform: ${{ mac_platform }}
    bazel: ${{ bazel }}
    build_targets:
    - '@harfbuzz'
    build_flags:
    - "--cxxopt=-std=c++20"
    - "--incompatible_disallow_empty_glob=false"
    - "--@harfbuzz//:with_glib"
bcr_test_module:
  module_path: tests
  matrix:
    linux_platform:
    - debian11
    - ubuntu2204
    mac_platform:
    - macos
    bazel: ["7.x", "8.x", "9.x", "rolling"]
  tasks:
    test_test_module_linux:
      name: Test smoke consumer on Linux
      platform: ${{ linux_platform }}
      bazel: ${{ bazel }}
      build_flags:
      - "--cxxopt=-std=c++20"
      - "--incompatible_disallow_empty_glob=false"
      test_flags:
      - "--cxxopt=-std=c++20"
      - "--incompatible_disallow_empty_glob=false"
      test_targets:
      - //:smoke
    test_test_module_macos:
      name: Test smoke consumer on macOS
      platform: ${{ mac_platform }}
      bazel: ${{ bazel }}
      build_flags:
      - "--cxxopt=-std=c++20"
      - "--incompatible_disallow_empty_glob=false"
      test_flags:
      - "--cxxopt=-std=c++20"
      - "--incompatible_disallow_empty_glob=false"
      test_targets:
      - //:smoke
    test_test_module_macos_with_glib:
      name: Test smoke consumer on macOS with GLib
      platform: ${{ mac_platform }}
      bazel: ${{ bazel }}
      build_flags:
      - "--cxxopt=-std=c++20"
      - "--incompatible_disallow_empty_glob=false"
      - "--@harfbuzz//:with_glib"
      test_flags:
      - "--cxxopt=-std=c++20"
      - "--incompatible_disallow_empty_glob=false"
      - "--@harfbuzz//:with_glib"
      test_targets:
      - //:smoke
