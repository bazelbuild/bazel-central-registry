matrix:
  platform:
    - debian10
    - macos_arm64
    - rockylinux8
    - ubuntu2004
    - ubuntu2004_arm64
    - windows
  bazel: ["7.x", "8.x", "9.x"]
tasks:
  verify_targets:
    name: "Run test module"
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_flags:
    - "-k"
    build_targets:
    - "@m4//..."
