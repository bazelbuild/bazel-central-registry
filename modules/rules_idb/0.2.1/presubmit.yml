# BCR presubmit: build-only — BCR CI cannot run simulator tests.
matrix:
  platform: ["macos_arm64"]
  bazel: ["9.x"]
tasks:
  verify_targets:
    name: Verify build targets
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets:
      - "@rules_idb//idb:default_runner"
      - "@rules_idb//tools:preboot"
