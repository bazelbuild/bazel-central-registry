matrix:
  platform:
    - debian10
    - debian13
    - debian13_arm64
    - macos_arm64
    - rockylinux8
    - ubuntu2004
    - ubuntu2004_arm64
  bazel: ["7.x", "8.x", "9.x"]
tasks:
  verify_targets:
    name: "Run test module"
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets:
    - "@tftp-hpa//..."
  verify_no_features:
    name: "Build with all optional features disabled"
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_flags:
    - "--@tftp-hpa//:with_ipv6=False"
    - "--@tftp-hpa//:with_remap=False"
    - "--@tftp-hpa//:with_tcpwrappers=False"
    build_targets:
    - "@tftp-hpa//..."
