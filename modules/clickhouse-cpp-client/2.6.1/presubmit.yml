matrix:
  platform:
    - debian11
    - ubuntu2004
    - ubuntu2204
    - ubuntu2404
    - macos
    - macos_arm64
  bazel: [7.x, 8.x, rolling]
tasks:
  verify_targets:
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    # abseil-cpp (a dependency) requires C++17; Bazel 7.x defaults to
    # -std=c++14 on the Linux/GCC autodetected toolchain, so force the
    # standard explicitly. Mirrors abseil-cpp's own BCR presubmit. All
    # platforms here are Unix, so the GCC/Clang `-std=` form applies.
    build_flags:
      - "--cxxopt=-std=c++17"
    build_targets:
      - "@clickhouse-cpp-client//:clickhouse"
