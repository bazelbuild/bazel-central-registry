matrix:
  bazel: [7.x, 8.x, 9.x, rolling]
  platform:
    - debian13
    - rockylinux8
    - ubuntu2404
tasks:
  verify_targets:
    name: Verify sparse-map target
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_flags:
      - "--incompatible_autoload_externally=+@rules_cc"
    build_targets:
      - "@sparse_map//:sparse_map"
