matrix:
  platform: ["ubuntu2204"]
  bazel: ["8.x", "9.x"]
tasks:
  verify_public_target:
    name: "Verify public target"
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets:
      - "@gazelle_fold//:gazelle_fold"

bcr_test_module:
  module_path: "examples/bzlmod"
  matrix:
    platform: ["ubuntu2204"]
    bazel: ["8.x", "9.x"]
  tasks:
    run_downstream_example:
      name: "Run downstream example"
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      test_targets:
        - "//..."
