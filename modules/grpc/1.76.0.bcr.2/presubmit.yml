matrix:
  platform:
    - debian11
    - macos_arm64
    - ubuntu2004
    - ubuntu2204
    - ubuntu2404
  bazel_7_8:
    - 7.x
    - 8.x

tasks:
  verify_targets:
    platform: ${{ platform }}
    bazel: 8.x
    build_flags:
    - '--cxxopt=-std=c++17'
    - '--host_cxxopt=-std=c++17'
    build_targets:
      - "@grpc//:grpc"
      - "@grpc//:grpc_unsecure"
      - "@grpc//:grpc_opencensus_plugin"
      - "@grpc//:grpc_security_base"
      - "@grpc//:grpc++"
      - "@grpc//:grpc++_unsecure"
      - "@grpc//:grpc++_reflection"
      - "@grpc//:grpc++_test"
      - "@grpc//:grpcpp_admin"
      - "@grpc//:grpcpp_channelz"
      - "@grpc//:grpcpp_csds"
      - "@grpc//:grpcpp_orca_service"
      - "@grpc//examples/protos/..."

  verify_targets_with_openssl:
    platform: ${{ platform }}
    bazel: 8.x
    build_flags:
    - '--cxxopt=-std=c++17'
    - '--host_cxxopt=-std=c++17'
    - '--define=@grpc//third_party:use_openssl=true'
    build_targets:
      - "@grpc//:grpc"
      - "@grpc//:grpc_unsecure"
      - "@grpc//:grpc_opencensus_plugin"
      - "@grpc//:grpc_security_base"
      - "@grpc//:grpc++"
      - "@grpc//:grpc++_unsecure"
      - "@grpc//:grpc++_reflection"
      - "@grpc//:grpc++_test"
      - "@grpc//:grpcpp_admin"
      - "@grpc//:grpcpp_channelz"
      - "@grpc//:grpcpp_csds"
      - "@grpc//:grpcpp_orca_service"
      - "@grpc//examples/protos/..."

  # Bazel 9 removed autoloaded native rules. Exclude targets whose deps
  # lack Bazel 9 support: grpc++_test (googletest), grpc_opencensus_plugin
  # (opencensus-cpp).
  verify_targets_bazel_9:
    platform: ${{ platform }}
    bazel: 9.x
    build_flags:
    - '--cxxopt=-std=c++17'
    - '--host_cxxopt=-std=c++17'
    build_targets:
      - "@grpc//:grpc"
      - "@grpc//:grpc_unsecure"
      - "@grpc//:grpc_security_base"
      - "@grpc//:grpc++"
      - "@grpc//:grpc++_unsecure"
      - "@grpc//:grpc++_reflection"
      - "@grpc//:grpcpp_admin"
      - "@grpc//:grpcpp_channelz"
      - "@grpc//:grpcpp_csds"
      - "@grpc//:grpcpp_orca_service"
      - "@grpc//examples/protos/..."

  verify_targets_with_openssl_bazel_9:
    platform: ${{ platform }}
    bazel: 9.x
    build_flags:
    - '--cxxopt=-std=c++17'
    - '--host_cxxopt=-std=c++17'
    - '--define=@grpc//third_party:use_openssl=true'
    build_targets:
      - "@grpc//:grpc"
      - "@grpc//:grpc_unsecure"
      - "@grpc//:grpc_security_base"
      - "@grpc//:grpc++"
      - "@grpc//:grpc++_unsecure"
      - "@grpc//:grpc++_reflection"
      - "@grpc//:grpcpp_admin"
      - "@grpc//:grpcpp_channelz"
      - "@grpc//:grpcpp_csds"
      - "@grpc//:grpcpp_orca_service"
      - "@grpc//examples/protos/..."

  verify_targets_on_windows:
    platform: "windows"
    bazel: ${{ bazel_7_8 }}
    build_flags:
    - '--cxxopt=/std:c++17'
    - '--host_cxxopt=/std:c++17'
    - '--define=protobuf_allow_msvc=true'
    build_targets:
      - "@grpc//:grpc"
      - "@grpc//:grpc_unsecure"
      - "@grpc//:grpc_opencensus_plugin"
      - "@grpc//:grpc_security_base"
      - "@grpc//:grpc++"
      - "@grpc//:grpc++_unsecure"
      - "@grpc//:grpc++_reflection"
      - "@grpc//:grpc++_test"
      - "@grpc//:grpcpp_admin"
      - "@grpc//:grpcpp_channelz"
      - "@grpc//:grpcpp_csds"
      - "@grpc//:grpcpp_orca_service"

  verify_targets_on_windows_bazel_9:
    platform: "windows"
    bazel: 9.x
    build_flags:
    - '--cxxopt=/std:c++17'
    - '--host_cxxopt=/std:c++17'
    - '--define=protobuf_allow_msvc=true'
    build_targets:
      - "@grpc//:grpc"
      - "@grpc//:grpc_unsecure"
      - "@grpc//:grpc_security_base"
      - "@grpc//:grpc++"
      - "@grpc//:grpc++_unsecure"
      - "@grpc//:grpc++_reflection"
      - "@grpc//:grpcpp_admin"
      - "@grpc//:grpcpp_channelz"
      - "@grpc//:grpcpp_csds"
      - "@grpc//:grpcpp_orca_service"

  verify_targets_bazel_7:
    platform: ${{ platform }}
    bazel: 7.x
    build_flags:
    - '--cxxopt=-std=c++17'
    - '--host_cxxopt=-std=c++17'
    - '--features=-module_maps' # This is needed for Bazel 7 on macOS
    build_targets:
      - "@grpc//:grpc"
      - "@grpc//:grpc_unsecure"
      - "@grpc//:grpc_opencensus_plugin"
      - "@grpc//:grpc_security_base"
      - "@grpc//:grpc++"
      - "@grpc//:grpc++_unsecure"
      - "@grpc//:grpc++_reflection"
      - "@grpc//:grpc++_test"
      - "@grpc//:grpcpp_admin"
      - "@grpc//:grpcpp_channelz"
      - "@grpc//:grpcpp_csds"
      - "@grpc//:grpcpp_orca_service"
      - "@grpc//examples/protos/..."
