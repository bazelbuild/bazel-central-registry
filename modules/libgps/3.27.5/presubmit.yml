matrix:
  platform:
    - ubuntu2204
    - macos
    - macos_arm64
  bazel:
    - 8.x
    - 9.x
tasks:
  verify_targets:
    name: Verify build and test targets
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets:
      - "@libgps//:libgps"
      - "@libgps//:libgps_test"
    test_targets:
      - "@libgps//:libgps_test"
