matrix:
  platform: ["debian11", "ubuntu2204"]
  bazel: ["9.x"]
tasks:
  verify_targets:
    name: Verify build targets
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets:
      # Building the standard libraries bootstraps them by running the freshly
      # built nvc, so this also exercises the compiler end to end.
      - "@nvc//:nvc"
      - "@nvc//:std"
