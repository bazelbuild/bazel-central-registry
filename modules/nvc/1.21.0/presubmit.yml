matrix:
  platform:
    - debian12
    - ubuntu2204
    - ubuntu2204_arm64
  bazel:
    - "7.x"
    - "8.x"
    - "9.x"
tasks:
  defaults:
    name: "Build + test nvc — default flags"
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets:
      - "@nvc//..."
    test_targets:
      - "@nvc//..."
  no_llvm:
    name: "Build + test nvc — --enable_llvm=False"
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_flags:
      - "--@nvc//:enable_llvm=False"
    test_flags:
      - "--@nvc//:enable_llvm=False"
    build_targets:
      - "@nvc//..."
    test_targets:
      - "@nvc//..."
  no_vital:
    name: "Build + test nvc — --enable_vital=False"
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_flags:
      - "--@nvc//:enable_vital=False"
    test_flags:
      - "--@nvc//:enable_vital=False"
    build_targets:
      - "@nvc//..."
    test_targets:
      - "@nvc//..."
  no_default_paths:
    name: "Build + test nvc — --enable_default_paths=False"
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_flags:
      - "--@nvc//:enable_default_paths=False"
    test_flags:
      - "--@nvc//:enable_default_paths=False"
    build_targets:
      - "@nvc//..."
    test_targets:
      - "@nvc//..."
  debug:
    name: "Build + test nvc — --enable_debug=True"
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_flags:
      - "--@nvc//:enable_debug=True"
    test_flags:
      - "--@nvc//:enable_debug=True"
    build_targets:
      - "@nvc//..."
    test_targets:
      - "@nvc//..."
