matrix:
  platform:
    - debian11
    - ubuntu2204
    - ubuntu2404
    - macos
    - macos_arm64
  bazel:
    - 7.x
    - 8.x
    - rolling
tasks:
  verify_targets:
    name: Verify build targets
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets:
      - '@libvpx//:libvpx'
      - '@libvpx//:libvpx_consumer_link_test'
    test_targets:
      - '@libvpx//:libvpx_consumer_link_test'
