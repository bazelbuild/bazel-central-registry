matrix:
  platform:
    - ubuntu2404
    - ubuntu2404_arm64
    - macos
    - macos_arm64
    - windows
  bazel:
    - 7.x
    - 8.x
    - 9.x
    - rolling
tasks:
  verify_targets:
    name: Verify build targets
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets:
      - '@libvpx'
  verify_targets_windows_arm64:
    name: Verify build targets for Windows ARM64
    platform: windows
    setup:
      - echo bazel_dep(name = "rules_cc", version = "0.2.17") >> MODULE.bazel
      - echo cc_configure = use_extension("@rules_cc//cc:extensions.bzl", "cc_configure_extension") >> MODULE.bazel
      - echo use_repo(cc_configure, "local_config_cc", "local_config_cc_toolchains") >> MODULE.bazel
    bazel: ${{ bazel }}
    build_targets:
      - '@libvpx'
    build_flags:
      - '--cpu=x64_arm64_windows'
bcr_test_module:
  module_path: tests
  matrix:
    platform:
      - ubuntu2404
      - ubuntu2404_arm64
      - macos
      - macos_arm64
      - windows
    bazel:
      - 7.x
      - 8.x
      - 9.x
      - rolling
  tasks:
    build_test_module:
      name: Build sample project
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      build_targets:
        - //:smoke
    build_test_module_windows_arm64:
      name: Build sample project for Windows ARM64
      platform: windows
      setup:
        - echo bazel_dep(name = "rules_cc", version = "0.2.17") >> MODULE.bazel
        - echo cc_configure = use_extension("@rules_cc//cc:extensions.bzl", "cc_configure_extension") >> MODULE.bazel
        - echo use_repo(cc_configure, "local_config_cc", "local_config_cc_toolchains") >> MODULE.bazel
      bazel: ${{ bazel }}
      build_targets:
        - //:smoke
      build_flags:
        - '--cpu=x64_arm64_windows'
