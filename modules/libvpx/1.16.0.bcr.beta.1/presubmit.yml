matrix:
  platform:
    - ubuntu2404
    - ubuntu2404_arm64
    - macos
    - macos_arm64
    - windows
  bazel:
    - 7.x
    - 8.x
    - 9.x
    - rolling
tasks:
  verify_targets:
    name: Verify build targets
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets:
      - '@libvpx'
bcr_test_module:
  module_path: tests
  matrix:
    platform:
      - ubuntu2404
      - ubuntu2404_arm64
      - macos
      - macos_arm64
      - windows
    bazel:
      - 7.x
      - 8.x
      - 9.x
      - rolling
  tasks:
    test_test_module:
      name: Test sample project
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      test_targets:
        - //:smoke
