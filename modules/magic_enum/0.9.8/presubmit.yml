matrix: &matrix
  platform:
    - debian13
    - ubuntu2004
    - ubuntu2204
    - ubuntu2404
    - macos_arm64
    - windows
  bazel: [8.x, 9.x, rolling]
tasks:
  verify_targets:
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets:
      - "@magic_enum//:magic_enum"

bcr_test_module:
  module_path: test
  matrix: *matrix
  tasks:
    run_test_module:
      name: Run test module
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      build_targets:
        - //...
      test_targets:
        - //...
